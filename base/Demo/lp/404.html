<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <base href="/lp/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - Zyntra</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Favicon - Zyntra.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0F0F23;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        /* Background shapes */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: #6C5CE7;
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: #00B894;
            bottom: -100px;
            left: -100px;
        }

        .error-container {
            position: relative;
            z-index: 1;
            max-width: 560px;
        }

        .error-code {
            font-size: clamp(100px, 20vw, 180px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #6C5CE7, #A29BFE, #00B894);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -4px;
        }

        .error-icon {
            margin-bottom: 24px;
        }

        .error-icon svg {
            color: #8888aa;
            opacity: 0.6;
        }

        .error-title {
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .error-message {
            font-size: 16px;
            line-height: 1.7;
            color: #8888aa;
            margin-bottom: 40px;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .btn--primary {
            background: linear-gradient(135deg, #6C5CE7, #5A4BD1);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn--primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
        }

        .btn--ghost {
            background: rgba(255,255,255,0.06);
            color: #a0a0c0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn--ghost:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            transform: translateY(-2px);
        }

        .error-links {
            margin-top: 48px;
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-links a {
            font-size: 14px;
            color: #636388;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .error-links a:hover {
            color: #A29BFE;
        }

        .logo-link {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .logo-link img {
            height: 32px;
            width: auto;
        }
    </style>
    <link rel="stylesheet" href="/css/design-system.css?v=20260502">
</head>
<body>
    <a href="index.html" class="logo-link">
        <img src="Zyntra - Branco.png" alt="Zyntra">
    </a>

    <div class="error-container">
        <div class="error-code">404</div>

        <div class="error-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.3-4.3"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </div>

        <h1 class="error-title">Página não encontrada</h1>
        <p class="error-message">
            A página que você está procurando pode ter sido removida, renomeada ou está temporariamente indisponível.
        </p>

        <div class="error-actions">
            <a href="index.html" class="btn btn--primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Voltar ao Início
            </a>
            <a href="index.html#contato" class="btn btn--ghost">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Fale Conosco
            </a>
        </div>

        <div class="error-links">
            <a href="index.html#funcionalidades">Funcionalidades</a>
            <a href="index.html#precos">Preços</a>
            <a href="pages/blog.html">Blog</a>
            <a href="pages/fale-conosco.html">Ajuda</a>
        </div>
    </div>
</body>
</html>
