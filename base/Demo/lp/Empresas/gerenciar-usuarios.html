<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <base href="/lp/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyntra: Gerenciar Usuįrios</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/gerenciar-usuarios.css">
    <link rel="stylesheet" href="css/pages-app.css">
    <link rel="icon" type="image/png" href="Favicon - Zyntra.png">
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="dash-nav">
        <div class="dash-nav__inner">
            <div class="dash-nav__left">
                <a href="Empresas/dashboard.html" class="dash-nav__logo">
                    <img src="Zyntra - Branco.png" alt="Zyntra">
                </a>
                <div class="dash-nav__links">
                    <a href="Empresas/dashboard.html" class="dash-nav__link">Meus Aplicativos</a>
                    <a href="Empresas/extrato-financeiro.html" class="dash-nav__link">Extrato Financeiro</a>
                    <a href="Empresas/treinamentos.html" class="dash-nav__link">Meus Treinamentos</a>
                    <a href="Empresas/zyntra-store.html" class="dash-nav__link">Zyntra Store</a>
                </div>

                <button class="dash-nav__mobile-toggle" id="mobileToggle" aria-label="Menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>

            <div class="dash-nav__right">
                <button class="dash-nav__notifications" aria-label="Notificaēões">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span class="badge">3</span>
                </button>

                <div style="position:relative;">
                    <button class="dash-nav__user" id="userBtn" aria-label="Menu do usuįrio">
                        <div class="dash-nav__avatar" id="userAvatar">U</div>
                        <span class="dash-nav__user-name" id="userName">Usuįrio</span>
                        <svg class="dash-nav__user-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                    </button>

                    <div class="user-dropdown" id="userDropdown">
                        <div class="user-dropdown__header">
                            <div class="user-dropdown__name" id="userFullName">Usuįrio</div>
                            <div class="user-dropdown__email" id="userEmail">usuario@email.com</div>
                        </div>
                        <button class="user-dropdown__item" onclick="window.location.href='dashboard.html'">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                            Meus Aplicativos
                        </button>
                        <button class="user-dropdown__item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Minha Conta
                        </button>
                        <div class="user-dropdown__divider"></div>
                        <button class="user-dropdown__item logout" id="btnLogout">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Sair da conta
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========== PAGE HEADER ========== -->
    <div class="gu-header">
        <div class="gu-header__inner">
            <div class="gu-header__left">
                <button class="gu-back-btn" onclick="window.location.href='dashboard.html'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    voltar
                </button>
                <div class="gu-header__title-wrap">
                    <h1>Gerenciar Usuįrios</h1>
                </div>
            </div>
            <div class="gu-header__actions">
                <button class="gu-action-btn primary" id="btnInviteUser">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    convidar
                </button>
                <button class="gu-action-btn secondary" id="btnRefresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    atualizar
                </button>
            </div>
        </div>
    </div>

    <!-- ========== COMPANY INFO ========== -->
    <main class="gu-main">
        <div class="gu-company-info">
            <div class="gu-company-info__left">
                <h2 class="gu-company-name" id="guCompanyName">ALUFORCE</h2>
                <span class="gu-company-status active" id="guCompanyStatus">Ativo</span>
            </div>
            <div class="gu-company-info__right">
                <div class="gu-company-logo" id="guCompanyLogo">
                    <img src="Icones/Icone Aluforce.jpg" alt="Aluforce">
                </div>
            </div>
        </div>

        <!-- ========== SEARCH BAR ========== -->
        <div class="gu-toolbar">
            <div class="gu-search">
                <svg class="gu-search__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="gu-search__input" placeholder="Buscar usuįrio por nome ou e-mail..." id="searchUsers">
            </div>
            <span class="gu-toolbar__count"><strong id="userCount">0</strong> usuįrios convidados</span>
        </div>

        <!-- ========== USERS TABLE ========== -->
        <div class="gu-table-wrap">
            <table class="gu-table">
                <thead>
                    <tr>
                        <th class="gu-table__th">Usuįrios convidados</th>
                        <th class="gu-table__th">Situaēćo</th>
                        <th class="gu-table__th">Grupo</th>
                        <th class="gu-table__th">Aēões</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- ========== MODAL: Convidar Usuįrio ========== -->
    <div class="modal-overlay" id="modalInviteUser">
        <div class="modal">
            <div class="modal__header">
                <h2>Convidar usuįrio</h2>
                <button class="modal__close" onclick="closeModal('modalInviteUser')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal__body">
                <p class="modal__desc">Envie um convite para um novo usuįrio acessar o sistema desta empresa.</p>
                <div class="modal__field">
                    <label for="inviteName">Nome completo</label>
                    <input type="text" id="inviteName" placeholder="Ex: Joćo Silva">
                </div>
                <div class="modal__field">
                    <label for="inviteEmail">E-mail</label>
                    <input type="email" id="inviteEmail" placeholder="Ex: joao@empresa.com.br">
                </div>
                <div class="modal__field">
                    <label for="inviteGroup">Grupo de acesso</label>
                    <select id="inviteGroup">
                        <option value="Administrador">Administrador</option>
                        <option value="Vendas">Vendas</option>
                        <option value="Financeiro">Financeiro</option>
                        <option value="Consultoria">Consultoria</option>
                        <option value="Visualizador">Visualizador</option>
                    </select>
                </div>
                <div class="modal__actions">
                    <button class="btn-dash btn-dash--outline" onclick="closeModal('modalInviteUser')">Cancelar</button>
                    <button class="btn-dash btn-dash--primary" id="btnSendInvite">Enviar convite</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Gerenciar Usuarios JavaScript -->
    <script src="js/gerenciar-usuarios.js"></script>

</body>
</html>
