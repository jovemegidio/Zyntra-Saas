<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Zyntra Igrejas — Grupos / Células</title>
    <link rel="icon" type="image/jpeg" href="/favicon-zyntra.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/igreja.css?v=20260416">
    <link rel="stylesheet" href="/css/design-system.css?v=20260502">
</head>
<body>
<a href="#main" class="skip-link">Pular para conteúdo</a>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-area">
        <header class="header" id="header"></header>
        <div class="page-content" id="main">
            <div class="page-header fade-in">
                <h1 class="page-title">👥 Grupos / Células</h1>
                <p class="page-subtitle">Gestão de grupos, células e ministérios</p>
            </div>
            <div class="toolbar fade-in fade-in-1">
                <div class="filter-chip active" onclick="filterGroups('all',this)">Todos</div>
                <div class="filter-chip" onclick="filterGroups('celula',this)">🏠 Células</div>
                <div class="filter-chip" onclick="filterGroups('jovens',this)">🎤 Jovens</div>
                <div class="filter-chip" onclick="filterGroups('louvor',this)">🎵 Louvor</div>
                <div class="filter-chip" onclick="filterGroups('infantil',this)">👶 Infantil</div>
                <div class="filter-chip" onclick="filterGroups('servico',this)">🤝 Serviço</div>
                <button class="btn btn-primary" style="margin-left:auto" data-admin-only onclick="openModal('modal-group')"><i class="fas fa-plus"></i> Novo Grupo</button>
            </div>
            <div class="grid-3 fade-in fade-in-2" id="groups-grid"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-group">
    <div class="modal">
        <div class="modal-header"><h2>Novo Grupo</h2><button class="modal-close" onclick="closeModal('modal-group')"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div class="form-group"><label>Nome</label><input type="text" class="form-control" placeholder="Nome do grupo"></div>
            <div class="form-row">
                <div class="form-group"><label>Tipo</label><select class="form-control"><option value="celula">Célula</option><option value="jovens">Jovens</option><option value="louvor">Louvor</option><option value="infantil">Infantil</option><option value="servico">Serviço</option></select></div>
                <div class="form-group"><label>Líder</label><input type="text" class="form-control" placeholder="Nome do líder"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Dia/Horário</label><input type="text" class="form-control" placeholder="Ex: Quartas 19:30"></div>
                <div class="form-group"><label>Local</label><input type="text" class="form-control" placeholder="Local do encontro"></div>
            </div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-group')">Cancelar</button><button class="btn btn-primary" onclick="closeModal('modal-group');showToast('Grupo criado!','success')">Salvar</button></div>
    </div>
</div>

<div id="a11y"></div>
<script src="js/igreja.js?v=20260416"></script>
<script>
document.getElementById('sidebar').innerHTML = SIDEBAR_HTML;
document.getElementById('header').innerHTML = getHeaderHTML('Grupos');
document.getElementById('a11y').innerHTML = A11Y_HTML;

var typeConfig = {celula:{icon:'fa-home',color:'#7c3aed'},jovens:{icon:'fa-guitar',color:'#3b82f6'},louvor:{icon:'fa-music',color:'#ec4899'},infantil:{icon:'fa-child',color:'#f59e0b'},servico:{icon:'fa-hands-helping',color:'#10b981'}};
var currentFilter = 'all';

function filterGroups(f,el){
    currentFilter=f;
    document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active')});
    if(el)el.classList.add('active');
    renderGroups();
}

function renderGroups(){
    var list = MOCK.groups;
    if(currentFilter!=='all') list=list.filter(function(g){return g.type===currentFilter});
    var html='';
    list.forEach(function(g){
        var cfg = typeConfig[g.type]||typeConfig.celula;
        html+='<div class="card"><div style="height:80px;background:linear-gradient(135deg,'+cfg.color+'30,'+cfg.color+'10);display:flex;align-items:center;justify-content:center;font-size:2rem"><i class="fas '+cfg.icon+'" style="color:'+cfg.color+'"></i></div><div class="card-body"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><h3 style="font-size:.9rem;font-weight:600">'+g.name+'</h3><span class="badge" style="background:'+cfg.color+'20;color:'+cfg.color+'">'+g.type+'</span></div><div style="font-size:.78rem;color:var(--text-secondary);display:grid;gap:6px"><div><i class="fas fa-user-tie" style="width:16px;margin-right:6px;color:var(--text-muted)"></i>'+g.leader+'</div><div><i class="fas fa-users" style="width:16px;margin-right:6px;color:var(--text-muted)"></i>'+g.members+' membros</div><div><i class="fas fa-clock" style="width:16px;margin-right:6px;color:var(--text-muted)"></i>'+g.meeting+'</div><div><i class="fas fa-map-marker-alt" style="width:16px;margin-right:6px;color:var(--text-muted)"></i>'+g.location+'</div></div></div></div>';
    });
    document.getElementById('groups-grid').innerHTML=html||'<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-people-group"></i><h3>Nenhum grupo encontrado</h3></div>';
}
renderGroups();
</script>
</body>
</html>
