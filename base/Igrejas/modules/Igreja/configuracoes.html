<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Zyntra Igrejas — Configurações</title>
    <link rel="icon" type="image/jpeg" href="/favicon-zyntra.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/igreja.css?v=20260416">
</head>
<body>
<a href="#main" class="skip-link">Pular para conteúdo</a>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside><div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-area">
        <header class="header" id="header"></header>
        <div class="page-content" id="main">
            <div class="page-header fade-in"><h1 class="page-title">⚙️ Configurações</h1><p class="page-subtitle">Preferências do sistema e dados da igreja</p></div>

            <!-- Dados da Igreja -->
            <div class="card fade-in fade-in-1" style="margin-bottom:16px">
                <div class="card-header"><h3 class="card-title"><i class="fas fa-church" style="color:var(--primary-light)"></i> Dados da Igreja</h3></div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                        <div class="form-group"><label>Nome</label><input class="form-control" value="Igreja Zyntra Community"></div>
                        <div class="form-group"><label>CNPJ</label><input class="form-control" value="12.345.678/0001-90"></div>
                        <div class="form-group"><label>Endereço</label><input class="form-control" value="Rua da Fé, 123 — Centro"></div>
                        <div class="form-group"><label>Cidade/UF</label><input class="form-control" value="São Paulo / SP"></div>
                        <div class="form-group"><label>Telefone</label><input class="form-control" value="(11) 3456-7890"></div>
                        <div class="form-group"><label>E-mail</label><input class="form-control" value="contato@zyntra.church"></div>
                        <div class="form-group"><label>Site</label><input class="form-control" value="https://zyntra.church"></div>
                        <div class="form-group"><label>Pastor Presidente</label><input class="form-control" value="Pr. Roberto Silva"></div>
                    </div>
                </div>
            </div>

            <!-- Aparência -->
            <div class="card fade-in fade-in-2" style="margin-bottom:16px">
                <div class="card-header"><h3 class="card-title"><i class="fas fa-palette"></i> Aparência</h3></div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
                        <div class="form-group"><label>Tema</label><select class="form-control" id="cfg-theme"><option value="dark" selected>Escuro</option><option value="light">Claro</option><option value="auto">Automático</option></select></div>
                        <div class="form-group"><label>Cor Primária</label><input class="form-control" type="color" value="#7c3aed" id="cfg-color"></div>
                        <div class="form-group"><label>Logo (URL)</label><input class="form-control" placeholder="https://..." id="cfg-logo"></div>
                    </div>
                </div>
            </div>

            <!-- Integrações -->
            <div class="card fade-in fade-in-3" style="margin-bottom:16px">
                <div class="card-header"><h3 class="card-title"><i class="fas fa-plug"></i> Integrações</h3></div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg-tertiary);border-radius:8px"><div style="display:flex;align-items:center;gap:12px"><i class="fab fa-whatsapp" style="font-size:1.5rem;color:#25D366"></i><div><strong>WhatsApp</strong><br><span style="font-size:.78rem;color:var(--text-muted)">Notificações via API</span></div></div><label style="position:relative;width:48px;height:24px"><input type="checkbox" checked style="display:none" id="int-whatsapp"><span style="position:absolute;inset:0;background:var(--success);border-radius:12px;cursor:pointer;transition:.3s" onclick="this.previousElementSibling.checked=!this.previousElementSibling.checked;this.style.background=this.previousElementSibling.checked?'var(--success)':'var(--bg-tertiary)'"><span style="position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.3s"></span></span></label></div>
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg-tertiary);border-radius:8px"><div style="display:flex;align-items:center;gap:12px"><i class="fab fa-youtube" style="font-size:1.5rem;color:#FF0000"></i><div><strong>YouTube</strong><br><span style="font-size:.78rem;color:var(--text-muted)">Transmissão ao vivo</span></div></div><label style="position:relative;width:48px;height:24px"><input type="checkbox" checked style="display:none"><span style="position:absolute;inset:0;background:var(--success);border-radius:12px;cursor:pointer;transition:.3s" onclick="this.previousElementSibling.checked=!this.previousElementSibling.checked;this.style.background=this.previousElementSibling.checked?'var(--success)':'var(--bg-tertiary)'"><span style="position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.3s"></span></span></label></div>
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg-tertiary);border-radius:8px"><div style="display:flex;align-items:center;gap:12px"><i class="fas fa-qrcode" style="font-size:1.5rem;color:var(--primary)"></i><div><strong>PIX</strong><br><span style="font-size:.78rem;color:var(--text-muted)">Doações via QR Code</span></div></div><label style="position:relative;width:48px;height:24px"><input type="checkbox" checked style="display:none"><span style="position:absolute;inset:0;background:var(--success);border-radius:12px;cursor:pointer;transition:.3s" onclick="this.previousElementSibling.checked=!this.previousElementSibling.checked;this.style.background=this.previousElementSibling.checked?'var(--success)':'var(--bg-tertiary)'"><span style="position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.3s"></span></span></label></div>
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg-tertiary);border-radius:8px"><div style="display:flex;align-items:center;gap:12px"><i class="fas fa-envelope" style="font-size:1.5rem;color:#3b82f6"></i><div><strong>E-mail SMTP</strong><br><span style="font-size:.78rem;color:var(--text-muted)">Envio de e-mails</span></div></div><label style="position:relative;width:48px;height:24px"><input type="checkbox" style="display:none"><span style="position:absolute;inset:0;background:var(--bg-tertiary);border-radius:12px;cursor:pointer;transition:.3s" onclick="this.previousElementSibling.checked=!this.previousElementSibling.checked;this.style.background=this.previousElementSibling.checked?'var(--success)':'var(--bg-tertiary)'"><span style="position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.3s"></span></span></label></div>
                    </div>
                </div>
            </div>

            <!-- Segurança -->
            <div class="card fade-in fade-in-4" style="margin-bottom:16px">
                <div class="card-header"><h3 class="card-title"><i class="fas fa-shield-alt"></i> Segurança</h3></div>
                <div class="card-body">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                        <div class="form-group"><label>Alterar Senha</label><input class="form-control" type="password" placeholder="Nova senha"></div>
                        <div class="form-group"><label>Confirmar Senha</label><input class="form-control" type="password" placeholder="Repetir nova senha"></div>
                    </div>
                    <div class="form-group" style="margin-top:8px">
                        <label><input type="checkbox" checked> Autenticação em dois fatores (2FA)</label>
                    </div>
                </div>
            </div>

            <div style="text-align:right"><button class="btn btn-primary btn-lg" onclick="showToast('Configurações salvas!','success')"><i class="fas fa-save"></i> Salvar Todas as Configurações</button></div>
        </div>
    </div>
</div>
<div id="a11y"></div>
<script src="js/igreja.js?v=20260416"></script>
<script>
document.getElementById('sidebar').innerHTML = SIDEBAR_HTML;
document.getElementById('header').innerHTML = getHeaderHTML('Configurações');
document.getElementById('a11y').innerHTML = A11Y_HTML;
</script>
</body>
</html>
