</head>

<body>

        <main class="main-area">
            <header class="header">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="Menu"><i
                            class="fas fa-bars"></i></button>
                    <div class="header-brand" style="display:flex;align-items:center;gap:10px;">
                        <img src="/images/Logo Monocromatico - Branco - Aluforce.png" alt="ALUFORCE"
                            style="height:22px;object-fit:contain;">
                        <span style="color:rgba(255,255,255,0.2);font-weight:300;font-size:18px;">|</span>
                        <img src="/images/zyntra-branco.png" alt="Zyntra" style="height:22px;object-fit:contain;">
                        <span style="color:rgba(255,255,255,0.3);font-size:12px;margin-left:4px;">— Faturamento</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="header-btn" title="Atualizar" onclick="location.reload()"><i
                            class="fas fa-sync-alt"></i></button>
                    <div class="user-greeting">
                        <span><span id="greeting-text">Bom dia</span>, <strong id="user-name">Usuário</strong></span>
                        <div class="user-avatar" id="user-avatar">
                            <img src="" alt="" id="user-photo"
                                style="display:none;width:100%;height:100%;border-radius:50%;object-fit:cover;">
                            <span id="user-initials">U</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <div class="page-header-top">
                        <div class="page-title-wrapper">
                            <div class="page-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                            <div>
                                <h1 class="page-title">Notas Fiscais Eletrônicas</h1>
                                <p class="page-subtitle">Gerenciamento de NF-e emitidas</p>
                            </div>
                        </div>
                        <div class="page-actions">
                            <button class="btn btn-primary" onclick="abrirModalNovaNovenfe()"><i
                                    class="fas fa-plus"></i> Nova NF-e</button>
                            <button class="btn btn-secondary" onclick="limparFiltros()"><i class="fas fa-eraser"></i>
                                Limpar Filtros</button>
                        </div>
                    </div>
                </div>

                <div class="metrics-grid" id="statsGrid">
                    <div class="metric-card orange">
                        <div class="metric-header">
                            <div class="metric-icon orange"><i class="fas fa-file-invoice"></i></div>
                            <span class="metric-trend" id="trend-total">&mdash;</span>
                        </div>
                        <div class="metric-value" id="statTotal">0</div>
                        <div class="metric-label">Total NF-e</div>
                    </div>
                    <div class="metric-card green">
                        <div class="metric-header">
                            <div class="metric-icon green"><i class="fas fa-check-circle"></i></div>
                            <span class="metric-trend" id="trend-autorizadas">&mdash;</span>
                        </div>
                        <div class="metric-value" id="statAutorizadas">0</div>
                        <div class="metric-label">Autorizadas</div>
                    </div>
                    <div class="metric-card blue">
                        <div class="metric-header">
                            <div class="metric-icon blue"><i class="fas fa-clock"></i></div>
                            <span class="metric-trend" id="trend-pendentes">&mdash;</span>
                        </div>
                        <div class="metric-value" id="statPendentes">0</div>
                        <div class="metric-label">Pendentes</div>
                    </div>
                    <div class="metric-card purple">
                        <div class="metric-header">
                            <div class="metric-icon purple"><i class="fas fa-dollar-sign"></i></div>
                            <span class="metric-trend" id="trend-valor">&mdash;</span>
                        </div>
                        <div class="metric-value" id="statValor">R$ 0,00</div>
                        <div class="metric-label">Valor Total</div>
                    </div>
                </div>

                <div class="filters-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Buscar por número, cliente..." id="filtroTexto">
                    </div>
                    <select class="filter-btn" id="filtroStatus">
                        <option value="">Todos os Status</option>
                        <option value="autorizada">Autorizada</option>
                        <option value="pendente">Pendente</option>
                        <option value="cancelada">Cancelada</option>
                        <option value="denegada">Denegada</option>
                    </select>
                    <input type="date" class="filter-btn" id="filtroDataInicio" title="Data Início">
                    <input type="date" class="filter-btn" id="filtroDataFim" title="Data Fim">
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-list"></i> Listagem de NF-e</h3>
                    </div>
                    <div class="card-body" style="padding:0;">
                        <div style="overflow-x:auto;">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Número</th>
                                        <th>Série</th>
                                        <th>Destinatário</th>
                                        <th>Valor</th>
                                        <th>Data Emissão</th>
                                        <th>Status</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="nfesList">
                                    <tr>
                                        <td colspan="7">
                                            <div class="empty-state"><i class="fas fa-file-invoice"></i>
                                                <p>Carregando notas fiscais...</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Nova NF-e -->
    <div class="modal-overlay" id="modalNovaNovenfe">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> Gerar NF-e a partir de Pedido</h3>
                <button class="modal-close" onclick="fecharModal('modalNovaNovenfe')"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>ID do Pedido de Venda</label>
                    <input type="number" class="form-control" id="pedidoId" placeholder="Informe o ID do pedido">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><input type="checkbox" id="gerarDanfe" checked> Gerar DANFE automaticamente</label>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="enviarEmail"> Enviar por e-mail</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="fecharModal('modalNovaNovenfe')">Cancelar</button>
                <button class="btn btn-primary" onclick="gerarNFe()"><i class="fas fa-file-invoice"></i> Gerar
                    NF-e</button>
            </div>
        </div>
    </div>

    <script>
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function abrirModalNovaNovenfe() {
            document.getElementById('modalNovaNovenfe').classList.add('active');
        }

        function fecharModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0);
        }

        function formatarData(data) {
            if (!data) return '-';
            return new Date(data).toLocaleDateString('pt-BR');
        }

        function limparFiltros() {
            document.getElementById('filtroStatus').value = '';
            document.getElementById('filtroDataInicio').value = '';
            document.getElementById('filtroDataFim').value = '';
            document.getElementById('filtroTexto').value = '';
            carregarNFes();
        }

        async function carregarEstatisticas() {
            try {
                const r = await fetch('/api/faturamento/estatisticas', { credentials: 'include' });
                if (r.ok) {
                    const d = await r.json();
                    document.getElementById('statTotal').textContent = d.total || 0;
                    document.getElementById('statAutorizadas').textContent = d.autorizadas || 0;
                    document.getElementById('statPendentes').textContent = d.pendentes || 0;
                    document.getElementById('statValor').textContent = formatarMoeda(d.valor_total);
                }
            } catch (e) { console.error('Erro ao carregar estatísticas:', e); }
        }

        async function carregarNFes() {
            try {
                const status = document.getElementById('filtroStatus').value;
                const inicio = document.getElementById('filtroDataInicio').value;
                const fim = document.getElementById('filtroDataFim').value;
                const r = await fetch(`/api/faturamento/nfes?status=${status}&data_inicio=${inicio}&data_fim=${fim}`, { credentials: 'include' });
                if (r.ok) {
                    const nfes = await r.json();
                    renderizarNFes(Array.isArray(nfes) ? nfes : nfes.data || []);
                }
            } catch (e) { console.error('Erro:', e); }
        }

        function renderizarNFes(nfes) {
            const tbody = document.getElementById('nfesList');
            if (!nfes.length) {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><i class="fas fa-file-invoice"></i><h3>Nenhuma NF-e encontrada</h3><p>Emita sua primeira nota fiscal</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = nfes.map(n => `
        <tr>
            <td><span class="code">${n.número || '-'}</span></td>
            <td>${n.serie || '1'}</td>
            <td>${n.destinatario || n.cliente || '-'}</td>
            <td><strong>${formatarMoeda(n.valor)}</strong></td>
            <td>${formatarData(n.data_emissao)}</td>
            <td><span class="badge ${(n.status || 'pendente').toLowerCase()}">${n.status || 'Pendente'}</span></td>
            <td>
                <div style="display:flex;gap:4px;">
                    <button class="action-btn view" onclick="verDetalhes(${n.id})" title="Detalhes"><i class="fas fa-eye"></i></button>
                    <button class="action-btn success" onclick="enviarSEFAZ(${n.id})" title="Enviar SEFAZ"><i class="fas fa-paper-plane"></i></button>
                    <button class="action-btn" onclick="baixarDANFE(${n.id})" title="DANFE"><i class="fas fa-file-pdf"></i></button>
                    <button class="action-btn delete" onclick="cancelarNFe(${n.id})" title="Cancelar"><i class="fas fa-times"></i></button>
                </div>
            </td>
        </tr>
    `).join('');
        }

        async function gerarNFe() {
            // SECURITY FIX: Idempotency guard - prevent double-click on fiscal operation
            if (gerarNFe._running) return;
            gerarNFe._running = true;
            const btn = document.querySelector('[onclick="gerarNFe()"]');
            if (btn) btn.disabled = true;
            try {
                const pedidoId = document.getElementById('pedidoId').value;
                if (!pedidoId) { alert('Informe o ID do pedido'); return; }
                const r = await fetch('/api/faturamento/gerar-nfe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ pedido_id: pedidoId, gerar_danfe: document.getElementById('gerarDanfe').checked, enviar_email: document.getElementById('enviarEmail').checked })
                });
                if (r.ok) {
                    fecharModal('modalNovaNovenfe');
                    carregarNFes();
                    carregarEstatisticas();
                    alert('NF-e gerada com sucesso!');
                } else {
                    const e = await r.json().catch(() => null);
                    if (e?.errorCode === 'IBGE_PREFLIGHT' && e?.camposFaltantes?.length) {
                        alert('Dados fiscais incompletos:\n\n• ' + e.camposFaltantes.join('\n• ') + '\n\nCorrija os cadastros e tente novamente.');
                    } else if (e?.errorCode === 'RBAC_DENIED') {
                        alert('Permissão insuficiente:\n\n' + (e?.message || 'Você não possui permissão para gerar NF-e.'));
                    } else if (e?.errorCode === 'CERTIFICADO_INVALIDO') {
                        alert('Certificado Digital:\n\n' + (e?.message || 'Certificado inválido ou expirado.'));
                    } else if (e?.errorCode === 'NFE_DUPLICADA') {
                        alert('NF-e Duplicada:\n\n' + (e?.message || 'Já existe NF-e para este pedido.'));
                    } else {
                        alert('Erro ao gerar NF-e: ' + (e?.message || e?.error || 'Erro desconhecido'));
                    }
                }
            } catch (e) { alert('Erro de conexão'); } finally {
                gerarNFe._running = false;
                if (btn) btn.disabled = false;
            }
        }

        async function cancelarNFe(id) {
            const motivo = prompt('Digite o motivo do cancelamento (mínimo 15 caracteres):');
            if (!motivo) return;
            if (motivo.trim().length < 15) {
                alert('O motivo deve ter no mínimo 15 caracteres.');
                return;
            }
            if (!confirm('Deseja realmente cancelar esta NF-e? Esta ação não pode ser desfeita.')) return;
            // SECURITY FIX: Idempotency guard - prevent double-click on fiscal cancellation
            if (cancelarNFe._running) return;
            cancelarNFe._running = true;
            const btn = event?.target?.closest?.('button');
            if (btn) btn.disabled = true;
            try {
                const resp = await fetch(`/api/faturamento/nfes/${id}/cancelar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ motivo })
                });
                const data = await resp.json().catch(() => null);
                if (resp.ok) {
                    alert(data?.message || 'NF-e cancelada com sucesso!');
                    carregarNFes();
                    carregarEstatisticas();
                } else {
                    const mensagemErro = data?.message || data?.error || 'Falha ao cancelar NF-e. Tente novamente.';
                    alert('Erro ao cancelar NF-e: ' + mensagemErro);
                }
            } catch (e) {
                const mensagemErro = e?.message || 'Falha na comunicação com o servidor.';
                alert('Erro ao cancelar NF-e: ' + mensagemErro);
            } finally {
                cancelarNFe._running = false;
                if (btn) btn.disabled = false;
            }
        }

        function verDetalhes(id) { alert('Detalhes da NF-e #' + id); }

        async function enviarSEFAZ(id) {
            // SECURITY FIX: Idempotency guard - prevent double-click on SEFAZ submission
            if (enviarSEFAZ._running) return;
            enviarSEFAZ._running = true;
            const btn = event?.target?.closest?.('button');
            if (btn) btn.disabled = true;
            try {
                const r = await fetch(`/api/faturamento/nfes/${id}/enviar-sefaz`, { method: 'POST', credentials: 'include' });
                if (r.ok) { alert('Enviado à SEFAZ com sucesso!'); carregarNFes(); }
                else {
                    const e = await r.json().catch(() => null);
                    if (e?.errorCode === 'CERTIFICADO_INVALIDO') {
                        alert('Certificado Digital:\n\n' + (e?.message || 'Certificado inválido ou expirado.'));
                    } else if (e?.errorCode === 'CREDENCIAL_SEFAZ') {
                        alert('Credenciais SEFAZ:\n\n' + (e?.message || 'Credenciais de acesso inválidas.'));
                    } else if (e?.errorCode === 'SEFAZ_INDISPONIVEL') {
                        alert('SEFAZ Indisponível:\n\n' + (e?.message || 'Serviço temporariamente indisponível.'));
                    } else if (e?.errorCode === 'RBAC_DENIED') {
                        alert('Permissão insuficiente:\n\n' + (e?.message || 'Você não possui permissão para enviar à SEFAZ.'));
                    } else {
                        alert('Erro ao enviar à SEFAZ: ' + (e?.message || e?.motivo || 'Erro desconhecido'));
                    }
                }
            } catch (e) { alert('Erro de conexão'); } finally {
                enviarSEFAZ._running = false;
                if (btn) btn.disabled = false;
            }
        }

        async function baixarDANFE(id) {
            window.open(`/api/faturamento/nfes/${id}/danfe`, '_blank');
        }

        function carregarUsuarioLogado() {
            const avatarNameMap = { 'admin': 'AD', 'Admin': 'AD', 'usuario': 'US', 'João': 'JO', 'Maria': 'MA', 'Pedro': 'PE', 'Ana': 'AN', 'Carlos': 'CA', 'Lucas': 'LU', 'Mariana': 'MN', 'Fernanda': 'FE', 'Rafael': 'RA', 'Juliana': 'JU', 'Gabriel': 'GA', 'Beatriz': 'BE', 'Diego': 'DI', 'Camila': 'CM' };
            const h = new Date().getHours();
            const g = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
            document.getElementById('greeting-text').textContent = g;
            fetch('/api/me', { credentials: 'include' })
                .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
                .then(u => {
                    const nome = u.nome || u.name || 'Usuário';
                    document.getElementById('user-name').textContent = nome.split(' ')[0];
                    const initials = avatarNameMap[nome.split(' ')[0]] || nome.substring(0, 2).toUpperCase();
                    document.getElementById('user-initials').textContent = initials;
                    if (u.foto || u.avatar) {
                        document.getElementById('user-photo').src = u.foto || u.avatar;
                        document.getElementById('user-photo').style.display = 'block';
                        document.getElementById('user-initials').style.display = 'none';
                    }
                }).catch(() => { });
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarUsuarioLogado();
            carregarEstatisticas();
            carregarNFes();
        });
    </script>
