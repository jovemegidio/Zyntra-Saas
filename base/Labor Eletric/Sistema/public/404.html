<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Página não encontrada | Zyntra</title>
    <link rel="icon" type="image/jpeg" href="/favicon-zyntra.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0f1117;
            --bg-card: #1a1d27;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --primary-dark: #2563eb;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.06);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== Animated Background ===== */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: floatGlow 12s ease-in-out infinite;
        }

        .bg-glow-1 {
            top: -200px;
            right: -100px;
            background: radial-gradient(circle, rgba(59,130,246,0.2), transparent 70%);
        }

        .bg-glow-2 {
            bottom: -200px;
            left: -100px;
            background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
            animation-delay: -6s;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        /* ===== Main Content ===== */
        .container-404 {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
            width: 100%;
        }

        /* ===== Logo ===== */
        .logo-404 {
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            animation: fadeInDown 0.6s ease forwards;
        }

        .logo-404 img {
            height: 28px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.85;
        }

        .logo-divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.12);
        }

        /* ===== 404 Number ===== */
        .number-404 {
            font-size: clamp(100px, 18vw, 180px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -6px;
            background: linear-gradient(135deg, var(--primary) 0%, #818cf8 50%, var(--primary) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 0.7s ease forwards, shimmer 4s ease-in-out infinite;
            opacity: 0;
            animation-delay: 0.15s;
            position: relative;
            user-select: none;
        }

        .number-404::after {
            content: '404';
            position: absolute;
            inset: 0;
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(40px);
            opacity: 0.3;
            z-index: -1;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ===== Icon Row ===== */
        .icon-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0 24px;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards;
            animation-delay: 0.3s;
        }

        .icon-row .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .icon-row i {
            font-size: 18px;
            color: var(--primary);
            opacity: 0.7;
        }

        /* ===== Text ===== */
        .title-404 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards;
            animation-delay: 0.4s;
        }

        .desc-404 {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 440px;
            margin: 0 auto 40px;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards;
            animation-delay: 0.5s;
        }

        /* ===== Actions ===== */
        .actions-404 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards;
            animation-delay: 0.6s;
        }

        .btn-404 {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
        }

        .btn-primary-404 {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(59,130,246,0.3), 0 0 0 0 rgba(59,130,246,0);
        }

        .btn-primary-404:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(59,130,246,0.4), 0 0 0 3px rgba(59,130,246,0.15);
        }

        .btn-secondary-404 {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary-404:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.12);
        }

        /* ===== Suggested Links ===== */
        .suggestions-404 {
            margin-top: 56px;
            opacity: 0;
            animation: fadeInUp 0.7s ease forwards;
            animation-delay: 0.8s;
        }

        .suggestions-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .suggestions-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
            background: var(--primary-glow);
            border-color: rgba(59,130,246,0.3);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .suggestion-chip i {
            font-size: 11px;
            opacity: 0.7;
        }

        /* ===== Footer ===== */
        .footer-404 {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            text-align: center;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 1s;
        }

        .footer-404 span {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .footer-404 .version {
            color: rgba(255,255,255,0.08);
            margin-left: 8px;
        }

        /* ===== Animations ===== */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .container-404 { padding: 32px 20px; }
            .number-404 { letter-spacing: -3px; }
            .actions-404 { flex-direction: column; width: 100%; }
            .btn-404 { width: 100%; justify-content: center; }
            .suggestions-grid { flex-direction: column; align-items: center; }
        }
    </style>
    <link rel="stylesheet" href="/css/design-system.css?v=20260502">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- Main Content -->
    <div class="container-404">
        <!-- Logo -->
        <div class="logo-404">
            <img src="/images/zyntra-branco.png" alt="Zyntra ERP">
        </div>

        <!-- 404 Number -->
        <div class="number-404">404</div>

        <!-- Icon Separator -->
        <div class="icon-row">
            <span class="dot"></span>
            <i class="fas fa-link-slash"></i>
            <span class="dot"></span>
        </div>

        <!-- Text -->
        <h1 class="title-404">Página não encontrada</h1>
        <p class="desc-404">
            A página que você está procurando pode ter sido movida, removida ou nunca existiu. 
            Verifique o endereço digitado ou volte para uma área segura.
        </p>

        <!-- Action Buttons -->
        <div class="actions-404">
            <a href="/index.html" class="btn-404 btn-primary-404">
                <i class="fas fa-th-large"></i>
                Ir para o Dashboard
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-404">
        <span>© 2026 Zyntra — Sistema de Gestão Integrado</span>
        <span class="version">Zyntra ERP</span>
    </div>
</body>
</html>
