<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aluforce: Aplicar Avaliações</title>
  <link rel="icon" type="image/jpeg" href="/favicon-zyntra.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="/css/modern-saas.css?v=3.0">
  <link rel="stylesheet" href="/css/global-header-sidebar.css?v=20260216">
  <style>
    :root { --sidebar-width:48px; --header-height:42px; --primary-dark:#1a1a2e; --primary-accent:#ec4899; }
    *{box-sizing:border-box} body{margin:0;font-family:var(--font-sans);background:var(--gray-100)}
    .app-container{display:flex;min-height:100vh}.sidebar{width:var(--sidebar-width);background:var(--primary-dark);display:flex;flex-direction:column;align-items:center;padding:12px 0}
    .sidebar-logo,.sidebar-btn{display:flex;align-items:center;justify-content:center;text-decoration:none}.sidebar-logo{width:36px;height:36px;border-radius:8px;background:var(--primary-accent);color:#fff;margin-bottom:16px}
    .sidebar-nav,.sidebar-bottom{display:flex;flex-direction:column;gap:4px}.sidebar-nav{flex:1}.sidebar-btn{width:40px;height:40px;border-radius:10px;color:#8b8b9a}.sidebar-btn.active,.sidebar-btn:hover{background:rgba(255,255,255,.12);color:#fff}
    .main-area{flex:1;display:flex;flex-direction:column;min-width:0}.header{height:var(--header-height);background:var(--primary-dark);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
    .header-left,.header-right{display:flex;align-items:center;gap:10px}.header-btn,.mobile-menu-btn{width:34px;height:34px;border:0;background:transparent;color:#8b8b9a;border-radius:8px;cursor:pointer}
    .header-btn:hover,.mobile-menu-btn:hover{background:rgba(255,255,255,.12);color:#fff}.header-brand{color:#fff;font-size:13px;font-weight:600}
    .user-greeting{display:flex;align-items:center;gap:10px;color:#8b8b9a;font-size:13px}.user-greeting strong{color:#fff}.user-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;display:flex;align-items:center;justify-content:center}.user-avatar img{display:none;width:100%;height:100%;object-fit:cover}.user-avatar img.visible{display:block}
     .content{padding:20px;display:grid;gap:16px}.page-title{margin:0;font-size:1.5rem}.page-subtitle{margin:4px 0 0;color:var(--gray-500)}.card-layout{display:grid;gap:14px}.section-title{margin:0 0 10px 0;font-size:1rem}.action-row{display:flex;gap:8px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px}.form-group{display:grid;gap:6px}
    .form-input,.form-textarea,select{width:100%;border:1px solid var(--gray-300);border-radius:var(--radius-md);padding:10px 12px;font:inherit}.form-textarea{min-height:90px;resize:vertical}
    .comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
    .comp-card{border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:10px;background:#fff;display:grid;gap:8px}
    .toast{position:fixed;right:16px;bottom:16px;background:#111827;color:#fff;border-radius:10px;padding:10px 14px;opacity:0;transform:translateY(8px);transition:all .2s;z-index:9999}.toast.show{opacity:1;transform:translateY(0)}.toast-danger{background:#dc2626}.toast-success{background:#059669}
    .sidebar-overlay{display:none}.sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50}
    @media(max-width:900px){.grid{grid-template-columns:1fr}} @media(max-width:768px){.sidebar{position:fixed;left:-60px;top:0;bottom:0;z-index:60;transition:left .2s}.sidebar.open{left:0}.content{padding:14px}}
  </style>
    <link rel="stylesheet" href="/css/modal-standard-compat.css?v=20260324">
    <link rel="stylesheet" href="/css/counter-global-standard.css?v=20260320">
</head>
<body>
  <div class="app-container">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="rhUiCommon.toggleMobileSidebar()" title="Abrir menu"></div>
    <aside class="sidebar" id="mobile-sidebar">
      <a href="/dashboard" class="sidebar-logo" title="Voltar ao Painel de Controle"><i class="fas fa-home"></i></a>
      <nav class="sidebar-nav">
        <a href="../areaadm.html" class="sidebar-btn" title="Dashboard RH"><i class="fas fa-chart-pie"></i></a>
        <a href="funcionarios.html" class="sidebar-btn" title="Funcionários"><i class="fas fa-users"></i></a>
        <a href="../gestão-holerites.html" class="sidebar-btn" title="Gestão de Holerites"><i class="fas fa-file-invoice-dollar"></i></a>
        <a href="gestão-ponto.html" class="sidebar-btn" title="Gestão do Ponto"><i class="fas fa-clock"></i></a>
        <a href="importar-ponto.html" class="sidebar-btn" title="Importar Ponto (Control iD)"><i class="fas fa-upload"></i></a>
        <a href="ferias.html" class="sidebar-btn" title="Gestão de Férias"><i class="fas fa-umbrella-beach"></i></a>
        <a href="gestão-solicitacoes.html" class="sidebar-btn" title="Gestão de Solicitações"><i class="fas fa-tasks"></i></a>
        <a href="calendario-rh.html" class="sidebar-btn" title="Calendário RH"><i class="fas fa-calendar-alt"></i></a>
      </nav>
      <div class="sidebar-bottom">
        <a href="avaliacoes.html" class="sidebar-btn" title="Avaliações"><i class="fas fa-star"></i></a>
        <a href="aplicar-avaliacoes.html" class="sidebar-btn active" title="Aplicar Avaliações"><i class="fas fa-clipboard-check"></i></a>
        <a href="../funcionario.html" class="sidebar-btn" title="Portal do Funcionário"><i class="fas fa-user"></i></a>
      </div>
    </aside>

    <main class="main-area">
      <header class="header">
        <div class="header-left"><button class="mobile-menu-btn" onclick="rhUiCommon.toggleMobileSidebar()" title="Abrir menu"><i class="fas fa-bars"></i></button><div class="header-brand" style="display:flex;align-items:center;gap:10px;">
                        <img src="/images/Logo Monocromatico - Branco - Aluforce.png" alt="ALUFORCE" style="height:22px;object-fit:contain;">
                        <span style="color:rgba(255,255,255,0.2);font-weight:300;font-size:18px;user-select:none;">|</span>
                        <img src="/images/zyntra-branco.png" alt="Zyntra" style="height:22px;object-fit:contain;">
                        <span style="color:rgba(255,255,255,0.18);font-weight:200;font-size:16px;user-select:none;margin:0 2px;"></span>
                        <span class="page-title" style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);letter-spacing:0.3px;">Aplicar Avaliações</span>
                    </div></div>
        <div class="header-right"><button class="header-btn" onclick="carregarBase()" title="Atualizar dados"><i class="fas fa-sync-alt"></i></button><div class="user-greeting"><span><span id="greeting-text">Bom dia</span>, <strong id="user-name">Usuario</strong></span><div class="user-avatar"><img id="user-photo" alt="avatar"><span id="user-initials">U</span></div></div></div>
      </header>

      <section class="content">
        <div>
          <h1 class="page-title">Aplicar Avaliações de Colaboradores</h1>
          <p class="page-subtitle">Fluxo exclusivo para gestores e administradores avaliarem equipes.</p>
        </div>

        <article class="saas-card">
          <div class="saas-card-header"><h2 class="saas-card-title">Nova Avaliação</h2></div>
          <div class="saas-card-body card-layout">
            <div class="grid">
              <div class="form-group"><label for="funcionário">Colaborador</label><select id="funcionário" class="form-input"></select></div>
              <div class="form-group"><label for="período">Período</label><select id="período" class="form-input"></select></div>
              <div class="form-group"><label for="tipo">Tipo de Avaliação</label><select id="tipo" class="form-input"><option value="gestor">Gestor</option><option value="desempenho">Desempenho</option><option value="feedback_360">Feedback 360</option></select></div>
            </div>

            <div class="grid">
              <div class="form-group"><label for="pontosFortes">Pontos Fortes</label><textarea id="pontosFortes" class="form-textarea" placeholder="Forcas observadas"></textarea></div>
              <div class="form-group"><label for="pontosMelhoria">Pontos de Melhoria</label><textarea id="pontosMelhoria" class="form-textarea" placeholder="Melhorias sugeridas"></textarea></div>
            </div>

            <div class="form-group"><label for="comentarios">Comentários do Avaliador</label><textarea id="comentarios" class="form-textarea" placeholder="Comentários gerais"></textarea></div>

            <div>
              <h3 class="section-title">Competências</h3>
              <div class="comp-grid" id="competencias-grid"></div>
            </div>

            <div class="action-row">
              <button class="saas-btn saas-btn-primary" onclick="salvarAvaliacao()"><i class="fas fa-floppy-disk"></i> Salvar Avaliação</button>
              <button class="saas-btn saas-btn-outline" onclick="limparFormulario()"><i class="fas fa-eraser"></i> Limpar</button>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"><span id="toast-message"></span></div>

  <script src="/js/auth-unified.js?v=20260214" defer></script>
    <script src="/js/inactivity-manager.js?v=20260324" defer></script>
  <script src="/modules/RH/public/js/controle-acesso-rh.js?v=20260319" defer></script>
  <script src="/modules/RH/public/js/rh-ui-common.js" defer></script>
  <script>
    let usuario = null;

    async function carregarBase() {
      const [funcResp, perResp, compResp] = await Promise.all([
        fetch('/api/rh/funcionarios', { headers: rhUiCommon.getAuthHeaders(), credentials: 'include' }),
        fetch('/api/rh/avaliacoes/periodos', { headers: rhUiCommon.getAuthHeaders(), credentials: 'include' }),
        fetch('/api/rh/avaliacoes/competencias', { headers: rhUiCommon.getAuthHeaders(), credentials: 'include' })
      ]);

      const funcionários = await funcResp.json().catch(function () { return []; });
      const periodos = await perResp.json().catch(function () { return []; });
      const competencias = await compResp.json().catch(function () { return []; });

      const funcSelect = document.getElementById('funcionário');
      funcSelect.innerHTML = Array.isArray(funcionários) && funcionarios.length
        ? funcionarios.map(function (f) { return `<option value='${Number(f.id)}'>${rhUiCommon.escapeHtml(f.nome_completo || f.nome || 'Funcionário')}</option>`; }).join('')
        : '<option value="">Sem colaboradores</option>';

      const perSelect = document.getElementById('período');
      perSelect.innerHTML = Array.isArray(periodos) && periodos.length
        ? periodos.map(function (p) { return `<option value='${Number(p.id)}'>${rhUiCommon.escapeHtml(p.nome || 'Período')}</option>`; }).join('')
        : '<option value="">Sem periodos</option>';

      const grid = document.getElementById('competencias-grid');
      if (!Array.isArray(competencias) || !competencias.length) {
        grid.innerHTML = '<small>Nenhuma competencia cadastrada.</small>';
        return;
      }

      grid.innerHTML = competencias.map(function (c) {
        return `<div class='comp-card' data-comp='${Number(c.id)}'>
          <strong>${rhUiCommon.escapeHtml(c.nome || '-')}</strong>
          <small>${rhUiCommon.escapeHtml(c.categoria || '')}</small>
          <label>Nota (1-5)</label>
          <input class='form-input comp-nota' type='number' min='1' max='5' value='3'>
          <label>Comentario</label>
          <input class='form-input comp-comentario' type='text' maxlength='220' placeholder='Observação'>
        </div>`;
      }).join('');
    }

    function coletarCompetencias() {
      return Array.from(document.querySelectorAll('.comp-card')).map(function (card) {
        const competenciaId = Number(card.getAttribute('data-comp'));
        const nota = Number(card.querySelector('.comp-nota').value || 0);
        const comentario = card.querySelector('.comp-comentario').value.trim();
        return {
          competencia_id: competenciaId,
          nota: Math.min(5, Math.max(1, nota)),
          peso: 1,
          comentario: comentario
        };
      });
    }

    async function salvarAvaliação() {
      const funcionarioId = Number(document.getElementById('funcionário').value || 0);
      const períodoId = Number(document.getElementById('período').value || 0);
      const tipo = document.getElementById('tipo').value;

      if (!funcionarioId || !periodoId) {
        rhUiCommon.showToast('Selecione colaborador e período.', 'danger');
        return;
      }

      const payload = {
        funcionario_id: funcionarioId,
        'per\u00edodo_id': periodoId,
        avaliador_id: Number(usuario.funcionario_id || usuario.id),
        tipo_avaliação: tipo,
        pontos_fortes: document.getElementById('pontosFortes').value.trim(),
        pontos_melhoria: document.getElementById('pontosMelhoria').value.trim(),
        comentarios_avaliador: document.getElementById('comentarios').value.trim(),
        competencias: coletarCompetencias()
      };

      const resp = await fetch('/api/rh/avaliacoes/criar', {
        method: 'POST',
        headers: rhUiCommon.getAuthHeaders({ 'Content-Type': 'application/json' }),
        credentials: 'include',
        body: JSON.stringify(payload)
      });

      const body = await resp.json().catch(function () { return {}; });
      if (!resp.ok) {
        rhUiCommon.showToast(body.message || body.error || 'Falha ao criar avaliação.', 'danger');
        return;
      }

      rhUiCommon.showToast('Avaliação registrada com sucesso.', 'success');
      limparFormulario();
    }

    function limparFormulario() {
      document.getElementById('pontosFortes').value = '';
      document.getElementById('pontosMelhoria').value = '';
      document.getElementById('comentarios').value = '';
      document.querySelectorAll('.comp-nota').forEach(function (el) { el.value = 3; });
      document.querySelectorAll('.comp-comentario').forEach(function (el) { el.value = ''; });
    }

    document.addEventListener('DOMContentLoaded', async function () {
      try {
        usuario = await rhUiCommon.ensureRole({ managerOrAdmin: true });
        rhUiCommon.updateHeaderUser(usuario);
        await carregarBase();
      } catch (e) {
        rhUiCommon.showToast(e.message || 'Acesso negado para aplicar avaliações.', 'danger');
        setTimeout(function () { window.location.href = '/rh/pages/avaliações-recebidas'; }, 900);
      }
    });
  </script>
    <script src="/js/user-dropdown.js?v=20260319" defer></script>
    <script src="/chat-teams/chat-widget.js?v=20260615" defer></script>
</body>
</html>
