<script>
let usuário = null;
function formatarData(v){if(!v) return '--'; const d=new Date(v); if(Number.isNaN(d.getTime())) return '--'; return d.toLocaleDateString('pt-BR');}
function fecharDrawer(){document.getElementById('drawer-detalhes').classList.remove('open');}
function statusHtml(status){const txt=rhUiCommon.escapeHtml(status||'RASCUNHO'); const cls=String(status||'').toUpperCase()==='CONCLUIDA'?'badge-concluida':'badge-rascunho'; return `<span class="badge ${cls}">${txt}</span>`;}

async function abrirDetalhes(id){
  const drawer=document.getElementById('drawer-detalhes'); const body=document.getElementById('drawer-body'); body.textContent='Carregando detalhes...'; drawer.classList.add('open');
  const resp = await fetch(`/api/rh/avaliacoes/${id}`, {headers: rhUiCommon.getAuthHeaders(), credentials:'include'});
  const data = await resp.json().catch(()=>null);
  if(!resp.ok || !data){body.textContent='Não foi possível carregar os detalhes.'; return;}
  const av = data.avaliação || {}; const itens = Array.isArray(data.itens) ? data.itens : [];
  body.innerHTML = `<div style='display:grid;gap:8px;margin-bottom:16px;'><div><strong>Período:</strong> ${rhUiCommon.escapeHtml(av.período_nome || av['per\u00edodo_nome'] || '--')}</div><div><strong>Avaliador:</strong> ${rhUiCommon.escapeHtml(av.avaliador_nome || '--')}</div><div><strong>Status:</strong> ${statusHtml(av.status)}</div><div><strong>Pontos fortes:</strong> ${rhUiCommon.escapeHtml(av.pontos_fortes || '--')}</div><div><strong>Pontos de melhoria:</strong> ${rhUiCommon.escapeHtml(av.pontos_melhoria || '--')}</div><div><strong>Comentarios:</strong> ${rhUiCommon.escapeHtml(av.comentarios_avaliador || '--')}</div></div><h3 style='margin:0 0 8px 0;'>Competencias</h3><div style='display:grid;gap:8px;'>${itens.map(i=>`<div class='saas-card' style='padding:10px;'><strong>${rhUiCommon.escapeHtml(i.competencia_nome || '-')}</strong><br><small>Nota: ${rhUiCommon.escapeHtml(String(i.nota || 0))}</small><br><small>${rhUiCommon.escapeHtml(i.comentario || '')}</small></div>`).join('') || '<small>Nenhuma competencia registrada.</small>'}</div>`;
}

async function carregarAvaliacoes(){
  const id = usuário.funcionário_id || usuário.id;
  const resp = await fetch(`/api/rh/avaliacoes/funcionario/${id}`, {headers: rhUiCommon.getAuthHeaders(), credentials:'include'});
  const rows = await resp.json().catch(()=>[]);
  const tb = document.getElementById('tbody-avaliações');
  if(!resp.ok){tb.innerHTML='<tr><td colspan="6">Falha ao carregar avaliações.</td></tr>'; return;}
  if(!Array.isArray(rows) || !rows.length){tb.innerHTML='<tr><td colspan="6">Você ainda não recebeu avaliações.</td></tr>'; return;}
  tb.innerHTML = rows.map(r=>`<tr><td>${rhUiCommon.escapeHtml(r.período_nome || r['per\u00edodo_nome'] || '--')}</td><td>${rhUiCommon.escapeHtml(r.avaliador_nome || '--')}</td><td>${rhUiCommon.escapeHtml(r.tipo_avaliação || '--')}</td><td>${statusHtml(r.status)}</td><td>${rhUiCommon.escapeHtml(formatarData(r.data_avaliação))}</td><td><button class='saas-btn saas-btn-outline' onclick='abrirDetalhes(${Number(r.id)})'><i class='fas fa-eye'></i> Ver</button></td></tr>`).join('');
}

document.addEventListener('DOMContentLoaded', async function(){
  try{usuário = await rhUiCommon.getCurrentUser(); rhUiCommon.updateHeaderUser(usuário); await carregarAvaliacoes();}
  catch(e){rhUiCommon.showToast('Não foi possível carregar as avaliações recebidas.', 'danger');}
});
</script>
