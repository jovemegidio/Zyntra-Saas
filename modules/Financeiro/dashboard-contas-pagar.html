        /* ===== Toast Notifications ===== */
        .toast-container {
            position: fixed; top: 24px; right: 24px; z-index: 100000;
            display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            display: flex; align-items: center; gap: 12px;
            min-width: 320px; max-width: 440px;
            padding: 14px 18px; border-radius: var(--radius-lg, 12px);
            background: #fff; color: #1f2937;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid #9ca3af;
            font-size: 0.85rem; font-weight: 500; line-height: 1.4;
            animation: toastSlideIn 0.35s cubic-bezier(.21,1.02,.73,1) forwards;
            transform: translateX(120%); position: relative; overflow: hidden;
        }
        .toast.hiding { animation: toastSlideOut 0.3s ease forwards; }
        .toast .toast-icon {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
        }
        .toast .toast-body { flex: 1; }
        .toast .toast-close {
            flex-shrink: 0; background: none; border: none; color: #9ca3af;
            cursor: pointer; padding: 4px; font-size: 0.75rem; border-radius: 4px; transition: all 0.15s;
        }
        .toast .toast-close:hover { color: #374151; background: #f3f4f6; }
        .toast.success { border-left-color: #10b981; }
        .toast.success .toast-icon { background: #ecfdf5; color: #059669; }
        .toast.error { border-left-color: #ef4444; }
        .toast.error .toast-icon { background: #fef2f2; color: #dc2626; }
        .toast.warning { border-left-color: #f59e0b; }
        .toast.warning .toast-icon { background: #fffbeb; color: #d97706; }
        .toast.info { border-left-color: #3b82f6; }
        .toast.info .toast-icon { background: #eff6ff; color: #2563eb; }
        .toast .toast-progress {
            position: absolute; bottom: 0; left: 4px; right: 0; height: 3px;
            border-radius: 0 0 8px 0;
            animation: toastProgress var(--toast-duration, 4s) linear forwards;
        }
        .toast.success .toast-progress { background: #10b981; }
        .toast.error .toast-progress { background: #ef4444; }
        .toast.warning .toast-progress { background: #f59e0b; }
        .toast.info .toast-progress { background: #3b82f6; }
        @keyframes toastSlideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastSlideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
        @keyframes toastProgress { from { width: 100%; } to { width: 0%; } }
    </style>

    <!-- Modal Nova Cotação -->
    <div class="modal-overlay" id="modalNovaCotacao">
        <div class="modal" style="max-width:800px;">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> <span id="modalCotacaoTitulo">Nova Cotação de Compra</span></h3>
                <button class="modal-close" onclick="fecharModalCotação()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">

                    <input type="hidden" id="cotacaoNumero" value="">

                        </div>

                        </div>
                    </div>
                    <div class="form-row">

                            <input type="number" id="cotQuantidade" class="form-control" placeholder="0" min="1" required>
                        </div>

                                <option value="M2">M - Metro Quadrado</option>
                                <option value="M">M - Metro Linear</option>
                                <option value="KG">KG - Quilograma</option>
                                <option value="PC">PC - Peça</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Fornecedores para Cotação</label>
                        <!-- Fornecedores carregados dinamicamente via carregarFornecedores() -->
                        <div id="fornecedoresContainer" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
                            <span style="color:var(--gray-400);font-size:13px;"><i class="fas fa-spinner fa-spin"></i> Carregando fornecedores...</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="cotObservacoes" class="form-control" rows="3" placeholder="Observações adicionais para os fornecedores..."></textarea>
                    </div>

            </div>

                <button class="btn btn-secondary" onclick="fecharModalCotação()">Cancelar</button>

    <script>
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('active');
        }

        async function carregarFornecedores() {
            const container = document.getElementById('fornecedoresContainer');
            if (!container) return;
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const r = await fetch('/api/compras/fornecedores', { headers: { 'Authorization': `Bearer ${token}` } });
                if (r.ok) {
                    const data = await r.json();
                    const fornecedores = data.fornecedores || data || [];
                    if (fornecedores.length) {
                        container.innerHTML = fornecedores.map(f => 
                            `<label class="fornecedor-checkbox"><input type="checkbox" name="fornecedores" value="${f.id}"> ${f.razao_social || f.nome || f.name}</label>`
                        ).join('');
                    } else {
                        container.innerHTML = '<span style="color:var(--gray-400);font-size:13px;">Nenhum fornecedor cadastrado</span>';
                    }
                } else { throw new Error('Falha ao carregar'); }
            } catch (e) {
                console.error('Erro ao carregar fornecedores:', e);
                container.innerHTML = '<span style="color:var(--danger-500,#ef4444);font-size:13px;">Erro ao carregar fornecedores</span>';
            }
        }

        async function carregarMateriaisCotação() {
            const select = document.getElementById('cotMaterial');
            if (!select) return;
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const r = await fetch('/api/pcp/produtos?limit=1000', { headers: { 'Authorization': `Bearer ${token}` } });
                if (r.ok) {
                    const data = await r.json();
                    const materiais = data.produtos || data || [];
                    select.innerHTML = '<option value="">Selecione o material...</option>' +
                        materiais.map(m => `<option value="${m.id}">${m.nome || m.descricao || m.name}</option>`).join('');
                }
            } catch (e) {
                console.error('Erro ao carregar materiais:', e);
            }
        }

        async function abrirModalNovaCotação() {
            document.getElementById('modalNovaCotacao').classList.add('active');
            document.getElementById('modalCotacaoTitulo').textContent = 'Nova Cotação de Compra';
            document.getElementById('formCotacao').reset();
            document.getElementById('cotacaoId').value = '';
            document.getElementById('cotacaoNumero').value = '';
            // Carregar materiais e fornecedores dinamicamente
            carregarMateriaisCotação();
            carregarFornecedores();
            // Buscar próximo número
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const r = await fetch('/api/compras/cotacoes/próximo-numero', { headers: { 'Authorization': `Bearer ${token}` } });
                if (r.ok) { const d = await r.json(); document.getElementById('cotacaoNumero').value = d.numero || d.proximo_numero || ''; }
            } catch (e) { document.getElementById('cotacaoNumero').value = 'COT-' + String(Date.now()).slice(-4); }
        }

        function fecharModalCotação() {
            document.getElementById('modalNovaCotacao').classList.remove('active');
        }

        let _salvandoCotação = false;
        async function salvarCotação() {
            if (_salvandoCotação) return;
            _salvandoCotação = true;
            const btn = event && event.target ? event.target : null;
            if (btn) btn.disabled = true;
            const descrição = document.getElementById('cotDescricao').value;
            const validade = document.getElementById('cotValidade').value;
            const material = document.getElementById('cotMaterial').value;
            const quantidade = document.getElementById('cotQuantidade').value;
            if (!descrição || !validade || !material || !quantidade) {
                showToast('Por favor, preencha todos os campos obrigatórios.', 'warning');
                _salvandoCotação = false; if (btn) btn.disabled = false;
                return;
            }

            const fornecedoresChecked = document.querySelectorAll('input[name="fornecedores"]:checked');
            const fornecedores_ids = Array.from(fornecedoresChecked).map(cb => parseInt(cb.value));

            const body = {
                número: document.getElementById('cotacaoNumero').value,
                descrição: descrição,
                data_abertura: new Date().toISOString().split('T')[0],
                data_validade: validade,
                quantidade: parseFloat(quantidade),
                unidade: document.getElementById('cotUnidade').value,
                observações: document.getElementById('cotObservacoes').value,
                fornecedores_ids: fornecedores_ids
            };

            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const cotaçãoId = document.getElementById('cotacaoId').value;
                const url = cotaçãoId ? `/api/compras/cotações/${cotaçãoId}` : '/api/compras/cotações';
                const method = cotaçãoId ? 'PUT' : 'POST';

                const r = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(body)
                });

                if (!r.ok) {
                    const err = await r.json().catch(() => ({}));
                    throw new Error(err.message || 'Erro ao salvar cotação');
                }

                showToast(cotaçãoId ? 'Cotação atualizada com sucesso!' : 'Cotação salva com sucesso!', 'success');
                fecharModalCotação();

                // Recarregar dados na tabela
                if (typeof cotaçõesManager !== 'undefined') {
                    await cotaçõesManager.carregarDados();
                    cotaçõesManager.atualizarCards();
                    cotaçõesManager.renderizarTabela();
                }
            } catch (e) {
                showToast('Erro: ' + e.message, 'error');
            } finally {
                _salvandoCotação = false; if (btn) btn.disabled = false;
            }
        }

        document.getElementById('modalNovaCotacao').addEventListener('click', function(e) {
            if (e.target === this) fecharModalCotação();
        });
    </script>

    <script>
    function showToast(message, type = 'success', duration = 4000) {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const icons = { success: 'fa-check', error: 'fa-xmark', warning: 'fa-exclamation', info: 'fa-info' };
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.style.setProperty('--toast-duration', duration + 'ms');
        var iconDiv = document.createElement('div');
        iconDiv.className = 'toast-icon';
        var iconEl = document.createElement('i');
        iconEl.className = 'fas ' + (icons[type] || icons.info);
        iconDiv.appendChild(iconEl);
        toast.appendChild(iconDiv);
        var bodyDiv = document.createElement('div');
        bodyDiv.className = 'toast-body';
        bodyDiv.textContent = message;
        toast.appendChild(bodyDiv);
        var closeBtn = document.createElement('button');
        closeBtn.className = 'toast-close';
        closeBtn.addEventListener('click', function() { this.parentElement.classList.add('hiding'); setTimeout(function() { closeBtn.parentElement.remove(); }, 300); });
        var closeIcon = document.createElement('i');
        closeIcon.className = 'fas fa-times';
        closeBtn.appendChild(closeIcon);
        toast.appendChild(closeBtn);
        var progressDiv = document.createElement('div');
        progressDiv.className = 'toast-progress';
        toast.appendChild(progressDiv);
        container.appendChild(toast);
        setTimeout(() => { if (toast.parentElement) { toast.classList.add('hiding'); setTimeout(() => toast.remove(), 300); } }, duration);
    }
    </script>
