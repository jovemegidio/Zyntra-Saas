<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="icon" type="image/jpeg" href="/favicon-zyntra.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zyntra: Faturamento — Inutilização</title>
    <script src="/js/auth-unified.js?v=20260326" defer></script>
    <script src="/js/inactivity-manager.js?v=20260324" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/faturamento-layout.css?v=20260413b">
    <link rel="stylesheet" href="/css/global-header-sidebar.css?v=20260216">
    <link rel="stylesheet" href="/css/tooltips-professional.css?v=20260209">
    <link rel="stylesheet" href="/chat/widget.css?v=20260218">
    <link rel="stylesheet" href="/css/modal-standard-compat.css?v=20260324">
    <link rel="stylesheet" href="/css/counter-global-standard.css?v=20260326">
</head>

<body>
    <div class="app-container">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

        <aside class="sidebar" id="mobile-sidebar">
            <a href="/dashboard" class="sidebar-logo" title="Voltar ao Painel"><i class="fas fa-home"></i></a>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-btn" title="Dashboard"><i class="fas fa-tachometer-alt"></i></a>
                <a href="index.html" class="sidebar-btn" title="NF-e"><i class="fas fa-file-invoice-dollar"></i></a>
                <a href="consultar.html" class="sidebar-btn" title="Consultar"><i class="fas fa-search"></i></a>
                <a href="eventos.html" class="sidebar-btn" title="Eventos"><i class="fas fa-calendar-check"></i></a>
                <a href="inutilizacao.html" class="sidebar-btn active" title="Inutilização"><i class="fas fa-ban"></i></a>
            </nav>
            <div class="sidebar-bottom">
                <a href="relatorios.html" class="sidebar-btn" title="Relatórios"><i class="fas fa-chart-bar"></i></a>
            </div>
        </aside>

        <main class="main-area">
            <header class="header">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="Menu"><i
                            class="fas fa-bars"></i></button>
                    <div class="header-brand" style="display:flex;align-items:center;gap:10px;">
                        <img src="/images/Logo Monocromatico - Branco - Aluforce.png" alt="ALUFORCE"
                            style="height:22px;object-fit:contain;">
                        <span style="color:rgba(255,255,255,0.2);font-weight:300;font-size:18px;">|</span>
                        <img src="/images/zyntra-branco.png" alt="Zyntra" style="height:22px;object-fit:contain;">
                        <span style="color:rgba(255,255,255,0.3);font-size:12px;margin-left:4px;">— Faturamento</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="header-btn" title="Atualizar" onclick="location.reload()"><i
                            class="fas fa-sync-alt"></i></button>
                    <div class="user-greeting">
                        <span><span id="greeting-text">Bom dia</span>, <strong id="user-name">Usuário</strong></span>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <div class="page-header-top">
                        <div class="page-title-wrapper">
                            <div class="page-icon"><i class="fas fa-ban"></i></div>
                            <div>
                                <h1 class="page-title">Inutilização de NF-e</h1>
                                <p class="page-subtitle">Registro de inutilização de numeração junto à SEFAZ</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KPIs -->
                <div class="metrics-grid">
                    <div class="metric-card orange">
                        <div class="metric-header">
                            <div class="metric-icon orange"><i class="fas fa-ban"></i></div>
                        </div>
                        <div class="metric-value" id="stat-canceladas">0</div>
                        <div class="metric-label">NF-e Canceladas</div>
                    </div>
                    <div class="metric-card blue">
                        <div class="metric-header">
                            <div class="metric-icon blue"><i class="fas fa-hashtag"></i></div>
                        </div>
                        <div class="metric-value" id="stat-inutilizadas">0</div>
                        <div class="metric-label">Faixas Inutilizadas</div>
                    </div>
                </div>

                <!-- NF-e Canceladas (dados reais existentes) -->
                <div class="card" style="margin-bottom:20px;">
                    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
                        <h3 class="card-title"><i class="fas fa-times-circle"></i> NF-e Canceladas</h3>
                    </div>
                    <div class="card-body" style="padding:0;">
                        <div style="overflow-x:auto;">
                            <table class="data-table" id="tabela-canceladas">
                                <thead>
                                    <tr>
                                        <th>Número</th>
                                        <th>Chave</th>
                                        <th>Data Emissão</th>
                                        <th>Data Cancelamento</th>
                                        <th>Valor</th>
                                        <th>Motivo</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="6">
                                            <div class="empty-state"><i class="fas fa-spinner fa-spin"></i>
                                                <p>Carregando...</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleMobileSidebar() {
            document.getElementById('mobile-sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        function esc(s) { return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
        function formatarMoeda(v) { return (parseFloat(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        async function carregarCanceladas() {
            try {
                const r = await fetch('/api/faturamento/nfes?status=cancelada&limite=100', { credentials: 'include' });
                if (r.ok) {
                    const data = await r.json();
                    const items = Array.isArray(data) ? data : (data.data || data.nfes || []);
                    const canceladas = items.filter(n => n.status === 'cancelada');
                    document.getElementById('stat-canceladas').textContent = canceladas.length;
                    const tbody = document.querySelector('#tabela-canceladas tbody');
                    if (!canceladas.length) {
                        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-check-circle"></i><p>Nenhuma NF-e cancelada</p></div></td></tr>';
                        return;
                    }
                    tbody.innerHTML = canceladas.map(n => `<tr>
                        <td><strong>${esc(n.numero || n.numero_nfe || '-')}</strong></td>
                        <td><span class="code" style="font-size:10px;">${esc((n.chave_acesso || '-').substring(0, 20))}...</span></td>
                        <td>${n.data_emissao ? new Date(n.data_emissao).toLocaleDateString('pt-BR') : '-'}</td>
                        <td>${n.data_cancelamento ? new Date(n.data_cancelamento).toLocaleDateString('pt-BR') : '-'}</td>
                        <td>${formatarMoeda(n.valor)}</td>
                        <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${esc(n.motivo_cancelamento)}">${esc(n.motivo_cancelamento || '-')}</td>
                    </tr>`).join('');
                }
            } catch (e) {
                console.error('Erro ao carregar canceladas:', e);
                document.querySelector('#tabela-canceladas tbody').innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-info-circle"></i><p>Nenhuma NF-e cancelada</p></div></td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const h = new Date().getHours();
            document.getElementById('greeting-text').textContent = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
            fetch('/api/me', { credentials: 'include' }).then(r => r.json()).then(u => {
                document.getElementById('user-name').textContent = (u.nome || u.name || 'Usuário').split(' ')[0];
            }).catch(() => {});
            carregarCanceladas();
        });
    </script>
    <script src="/js/tooltips-professional.js?v=20260209"></script>
    <script src="/js/mobile-auto-enhance.js?v=20260202" defer></script>
    <script src="/_shared/confirm-dialog.js?v=20260217"></script>
    <script src="/_shared/accessibility-widget.js?v=20260226"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/chat-teams/chat-widget.js?v=20260615" defer></script>
    <script src="/js/user-dropdown.js?v=20260319" defer></script>
</body>

</html>
