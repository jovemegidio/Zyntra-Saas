<!-- Preview Modal -->
<div class="modal-overlay" id="previewSection">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3><i class="fas fa-chart-bar"></i> <span id="previewTitle">Relatório</span></h3>
            <button class="modal-close" onclick="fecharPreview()" title="Fechar"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="previewContent"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="fecharPreview()">Fechar</button>
            <button class="btn btn-secondary" onclick="imprimirRelatorio()"><i class="fas fa-print"></i> Imprimir</button>
            <button class="btn btn-primary" onclick="exportarPDF()"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
        </div>
    </div>

<script>
function toggleMobileSidebar() {
    document.getElementById('mobile-sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('active');
}
function toggleNotificacoes() {}

var _relOriginalTitle = document.title;

var avatarNameMap = {
    'clemerson':'CM','isabela':'IB','thaina':'TH','thiago':'TG','nicolas':'NC',
    'nicolasdaniel':'ND','rh':'RH','admin':'AD','ti':'TI','tialuforce':'TI',
    'antonio':'AT','andreia':'AN','guilherme':'GH','marcelo':'MC','financeiro':'FN',
    'douglas':'DG','hellen':'HL','helen':'HL','marcia':'MR','augusto':'AG',
    'renata':'RN','fabiano':'FB','fabiola':'FL'
};

function carregarUsuario() {
    fetch('/api/me', { credentials:'include' })
    .then(function(r) { return r.json(); })
    .then(function(user) {
        var d = user.dados || user;
        var nome = (d.nome || d.name || 'Usuário').split(' ')[0];
        document.getElementById('user-name').textContent = nome;
        var h = new Date().getHours();
        document.getElementById('greeting-text').textContent = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
        var el = document.getElementById('user-initials');
        var photo = document.getElementById('user-photo');
        if (d.foto || d.avatar) {
            photo.src = d.foto || d.avatar; photo.style.display = 'block'; photo.style.width = '100%'; photo.style.height = '100%'; photo.style.borderRadius = '50%'; photo.style.objectFit = 'cover'; el.style.display = 'none';
        } else {
            var key = nome.toLowerCase().replace(/\s/g,'');
            el.textContent = avatarNameMap[key] || nome.substring(0,2).toUpperCase();
        }
    }).catch(function() {});
}

function _escHtml(text) {
    var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return String(text || '').replace(/[&<>"']/g, function(m) { return map[m]; });
}

function showAlert(msg, type) {
    var c = document.getElementById('alertContainer');
    var d = document.createElement('div');
    d.className = 'alert ' + (type || 'info');
    var iconMap = { 'success': 'check-circle', 'danger': 'times-circle', 'warning': 'exclamation-triangle', 'info': 'info-circle' };
    d.innerHTML = '<i class="fas fa-' + (iconMap[type] || 'info-circle') + '"></i> ' + _escHtml(msg);
    c.prepend(d);
    setTimeout(function() { if (d.parentNode) d.remove(); }, 5000);
}

var dadosRelatorioAtual = null;

function gerarRelatorio(tipo) {
    var di = document.getElementById('reportDataInicio').value;
    var df = document.getElementById('reportDataFim').value;
    var params = new URLSearchParams();
    params.append('tipo', tipo);
    if (di) params.append('dataInicio', di);
    if (df) params.append('dataFim', df);

    document.getElementById('previewTitle').textContent = 'Carregando...';
    document.getElementById('previewContent').innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin" style="font-size:32px;color:var(--primary-500);"></i><p style="margin-top:12px;color:var(--text-secondary);font-size:13px;">Carregando relatório...</p></div>';
    document.getElementById('previewSection').classList.add('active');
    document.getElementById('currentReportType').value = tipo;

    fetch('/api/nfe/relatorios/' + encodeURIComponent(tipo) + '?' + params.toString(), { credentials:'include' })
    .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    })
    .then(function(dados) {
        if (!dados || (!dados.colunas && !dados.resumo)) throw new Error('Dados vazios');
        dadosRelatorioAtual = dados;
        renderizarRelatorio(dados);
    })
    .catch(function(err) {
        dadosRelatorioAtual = null;
        document.getElementById('previewTitle').textContent = 'Relatório Indisponível';
        document.getElementById('previewContent').innerHTML = '<div style="text-align:center;padding:48px 24px;">' +
            '<i class="fas fa-database" style="font-size:48px;color:var(--text-muted);margin-bottom:16px;"></i>' +
            '<h3 style="color:var(--text-primary);font-size:16px;margin-bottom:8px;">Dados não disponíveis</h3>' +
            '<p style="color:var(--text-secondary);font-size:13px;max-width:400px;margin:0 auto;">Este relatório requer dados do servidor. Verifique se o endpoint da API está configurado ou tente novamente mais tarde.</p>' +
            '</div>';
    });
}

function renderizarRelatorio(dados) {
    document.getElementById('previewTitle').textContent = dados.titulo || 'Relatório';
    document.title = 'Aluforce: ' + (dados.titulo || 'Relatório');

    var periodo = '';
    var di = document.getElementById('reportDataInicio').value;
    var df = document.getElementById('reportDataFim').value;
    if (di && df) {
        periodo = new Date(di + 'T00:00:00').toLocaleDateString('pt-BR') + ' a ' + new Date(df + 'T00:00:00').toLocaleDateString('pt-BR');
    } else if (di) {
        periodo = 'A partir de ' + new Date(di + 'T00:00:00').toLocaleDateString('pt-BR');
    }

    var html = '';
    if (dados.resumo) {
        html += '<div class="report-summary">';
        dados.resumo.forEach(function(r) {
            html += '<div class="summary-card"><div class="label">' + _escHtml(r.label) + '</div><div class="value">' + _escHtml(r.value) + '</div></div>';
        });
        html += '</div>';
    }
    if (periodo) {
        html += '<div style="padding:8px 14px;background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:16px;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;"><i class="fas fa-calendar-alt" style="color:var(--primary-500);"></i> Período: <strong>' + periodo + '</strong></div>';
    }
    if (dados.colunas && dados.linhas) {
        html += '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>';
        dados.colunas.forEach(function(c) { html += '<th>' + _escHtml(c) + '</th>'; });
        html += '</tr></thead><tbody>';
        if (dados.linhas.length === 0) {
            html += '<tr><td colspan="' + dados.colunas.length + '" style="text-align:center;padding:24px;color:var(--text-muted);">Nenhum registro encontrado para o período selecionado</td></tr>';
        } else {
            dados.linhas.forEach(function(l) {
                html += '<tr>';
                l.forEach(function(v) { html += '<td>' + _escHtml(v) + '</td>'; });
                html += '</tr>';
            });
        }
        html += '</tbody></table></div>';
    }

    document.getElementById('previewContent').innerHTML = html;
}

function fecharPreview() {
    document.getElementById('previewSection').classList.remove('active');
    document.title = _relOriginalTitle;
}

// Close on overlay click
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('modal-overlay') && e.target.classList.contains('active')) {
        e.target.classList.remove('active');
        document.title = _relOriginalTitle;
    }
});

function exportarPDF() {
    var dados = dadosRelatorioAtual;
    if (!dados) { showAlert('Nenhum relatório carregado para exportar', 'warning'); return; }

    var periodo = '';
    var di = document.getElementById('reportDataInicio').value;
    var df = document.getElementById('reportDataFim').value;
    if (di && df) {
        periodo = new Date(di + 'T00:00:00').toLocaleDateString('pt-BR') + ' a ' + new Date(df + 'T00:00:00').toLocaleDateString('pt-BR');
    }
    var dataGeracao = new Date().toLocaleString('pt-BR');

    var win = window.open('', '_blank', 'width=900,height=700');
    var tableHtml = '';
    if (dados.colunas && dados.linhas) {
        tableHtml = '<table><thead><tr>';
        dados.colunas.forEach(function(c) { tableHtml += '<th>' + _escHtml(c) + '</th>'; });
        tableHtml += '</tr></thead><tbody>';
        dados.linhas.forEach(function(l, idx) {
            tableHtml += '<tr class="' + (idx % 2 === 0 ? 'even' : '') + '">';
            l.forEach(function(v) { tableHtml += '<td>' + _escHtml(v) + '</td>'; });
            tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table>';
    }

    var summaryHtml = '';
    if (dados.resumo) {
        summaryHtml = '<div class="summary-row">';
        dados.resumo.forEach(function(r) {
