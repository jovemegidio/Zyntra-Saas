    <script src="../js/pcp-common.js"></script>
    <script>
        let materiaisData = [];

        async function carregarMateriais() {
            try {
                const API_BASE = getAPIBase();

                // Preparar headers - usar credentials: 'include' para sessão via cookie
                const headers = { 'Content-Type': 'application/json' };

                console.log('?? Carregando materiais...');
                // Buscar apenas materiais com recebimento em compras
                const response = await fetch(`${API_BASE}/api/pcp/materiais?com_recebimento=true&limit=1000`, {
                    credentials: 'include',
                    headers: headers
                });

                if (response.status === 401) {
                    console.log('Não autenticado');
                    return;
                }

                if (response.ok) {
                    const data = await response.json();
                    materiaisData = Array.isArray(data) ? data : (data.rows || data.materiais || []);
                    materiaisData = materiaisData.map(m => ({
                        ...m,
                        codigo: m.codigo || m.codigo_material || '',
                        descricao: m.descricao || m.nome || '',
                        estoque: m.quantidade_estoque ?? m.estoque ?? 0,
                        estoque_minimo: m.estoque_minimo ?? 10,
                        unidade: m.unidade_medida || m.unidade || 'UN',
                        preco: m.custo_unitario || m.preco || 0
                    }));
                    atualizarEstatisticas();
                    renderizarMateriais();
                }
            } catch (error) {
                console.error('Erro ao carregar materiais:', error);
                showToast('Erro ao carregar materiais', 'error');
            }
        }

        function atualizarEstatisticas() {
            const total = materiaisData.length;
            const critico = materiaisData.filter(m => m.estoque <= (m.estoque_minimo * 0.5)).length;
            const baixo = materiaisData.filter(m => m.estoque <= m.estoque_minimo && m.estoque > (m.estoque_minimo * 0.5)).length;
            const normal = total - baixo - critico;

            document.getElementById('materiais-view-total').textContent = total;
            document.getElementById('materiais-normal').textContent = normal;
            document.getElementById('materiais-baixo').textContent = baixo;
            document.getElementById('materiais-critico').textContent = critico;
        }

        function renderizarMateriais() {
            const tbody = document.getElementById('materiais-table-body');
            const searchTerm = document.getElementById('search-materiais').value.toLowerCase();
            const tipo = document.getElementById('filter-tipo-material').value;

            let filtrados = materiaisData.filter(m => {
                const matchSearch = !searchTerm ||
                    (m.codigo && m.codigo.toLowerCase().includes(searchTerm)) ||
                    (m.descricao && m.descricao.toLowerCase().includes(searchTerm));
                const matchTipo = !tipo || m.tipo === tipo;
                return matchSearch && matchTipo;
            });

            document.getElementById('materiais-showing').textContent = filtrados.length;
            document.getElementById('materiais-total-count').textContent = materiaisData.length;

            if (filtrados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; padding: 60px;">
                    <i class="fas fa-cubes" style="font-size: 48px; color: var(--gray-300); margin-bottom: 16px;"></i>
                    <p style="color: var(--gray-500);">Nenhum material encontrado</p>
                </td></tr>`;
                return;
            }

            tbody.innerHTML = filtrados.map(m => `
                <tr>
                    <td><strong>${m.código || '-'}</strong></td>
                    <td>${m.descrição || '-'}</td>
                    <td><span class="badge badge-purple">${m.tipo || '-'}</span></td>
                    <td>${m.ncm || '-'}</td>
                    <td>${m.gtin || '-'}</td>
                    <td>${m.unidade || '-'}</td>
                    <td>${m.estoque || 0}</td>
                    <td>${formatarMoeda(m.preco)}</td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="editarMaterial(${m.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-secondary" onclick="verMaterial(${m.id})"><i class="fas fa-eye"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function buscarMateriais() { renderizarMateriais(); }
        function exportarMateriais() { exportarParaExcel(materiaisData, 'materiais'); }
        function abrirEntradaRapidaMaterial() { abrirModalMovimentacaoMaterial('entrada'); }
        function abrirSaidaRapidaMaterial() { abrirModalMovimentacaoMaterial('saida'); }
        function abrirAjusteInventarioMaterial() { abrirModalMovimentacaoMaterial('ajuste'); }
        function verHistoricoMaterial() { showToast('Histórico em desenvolvimento', 'info'); }

        document.getElementById('search-materiais').addEventListener('keypress', e => { if (e.key === 'Enter') buscarMateriais(); });

        document.addEventListener('DOMContentLoaded', function() {
            atualizarSaudacao();
            carregarMateriais();

            // Carregar modais via fetch
            fetch('../templates/pcp-modals.html')
                .then(res => res.text())
                .then(html => {
                    const container = document.createElement('div');
                    container.innerHTML = html;
                    document.body.appendChild(container);
                })
                .catch(err => console.warn('Modais não carregados:', err));
        });
    </script>
