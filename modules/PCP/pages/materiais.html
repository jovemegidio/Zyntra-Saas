        .page-header-top { display: flex; justify-content: flex-end; margin-bottom: var(--space-6); }
        .page-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; }
        .card-title { display: flex; align-items: center; gap: var(--space-2); font-size: 15px; font-weight: 600; color: var(--gray-800); }
        .card-title i { color: var(--primary-500); }

        .search-bar { display: flex; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; align-items: flex-end; }
        .search-input-wrapper { position: relative; flex: 1; min-width: 200px; }
        .search-input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray-400); }

        @media (max-width: 768px) {

        /* === Metric Card Standard (prospeccao.html) === */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .metric-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .metric-card.blue::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .metric-card.orange::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .metric-card.purple::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .metric-card.green::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .metric-card.red::before { background: linear-gradient(90deg, #ef4444, #f87171); }
        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .metric-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .metric-icon.blue { background: #eff6ff; color: #3b82f6; }
        .metric-icon.orange { background: #fff7ed; color: #f59e0b; }
        .metric-icon.purple { background: #faf5ff; color: #8b5cf6; }
        .metric-icon.green { background: #f0fdf4; color: #22c55e; }
        .metric-icon.red { background: #fef2f2; color: #ef4444; }
        .metric-trend {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
        }
        .metric-trend.up { background: #dcfce7; color: #16a34a; }
        .metric-trend.down { background: #fee2e2; color: #dc2626; }
        .metric-value {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
            margin-bottom: 4px;
        }
        .metric-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }
        /* Pattern B/C compat: metric-content/metric-info wrappers */
        .metric-content, .metric-info {
            display: flex;
            flex-direction: column;
        }
        .metric-content .metric-value,
        .metric-info .value,
        .metric-info h3 {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
            margin: 0 0 4px;
            order: 1;
        }
        .metric-content .metric-label,
        .metric-info h3:first-child {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            margin: 0;
        }
        .metric-content .metric-trend {
            order: 3;
            margin-top: 4px;
        }
        @media (max-width: 1400px) { .metrics-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 1024px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .metrics-grid { grid-template-columns: 1fr; } }
        /* === End Metric Card Standard === */

    </style>

    <script>
        let materiaisData = [];

        async function carregarMateriais() {
            try {
                const API_BASE = getAPIBase();

                // Preparar headers - usar credentials: 'include' para sessão via cookie
                const headers = { 'Content-Type': 'application/json' };

                console.log('?? Carregando materiais...');
                // Buscar apenas materiais com recebimento em compras
                const response = await fetch(`${API_BASE}/api/pcp/materiais?com_recebimento=true&limit=1000`, {
                    credentials: 'include',
                    headers: headers
                });

                if (response.status === 401) {
                    console.log('Não autenticado');
                    return;
                }

                if (response.ok) {
                    const data = await response.json();
                    materiaisData = Array.isArray(data) ? data : (data.rows || data.materiais || []);
                    materiaisData = materiaisData.map(m => ({
                        ...m,
                        codigo: m.codigo || m.codigo_material || '',
                        descricao: m.descricao || m.nome || '',
                        estoque: m.quantidade_estoque ?? m.estoque ?? 0,
                        estoque_minimo: m.estoque_minimo ?? 10,
                        unidade: m.unidade_medida || m.unidade || 'UN',
                        preco: m.custo_unitario || m.preco || 0
                    }));
                    atualizarEstatisticas();
                    renderizarMateriais();
                }
            } catch (error) {
                console.error('Erro ao carregar materiais:', error);
                showToast('Erro ao carregar materiais', 'error');
            }
        }

        function atualizarEstatisticas() {
            const total = materiaisData.length;
            const critico = materiaisData.filter(m => m.estoque <= (m.estoque_minimo * 0.5)).length;
            const baixo = materiaisData.filter(m => m.estoque <= m.estoque_minimo && m.estoque > (m.estoque_minimo * 0.5)).length;
            const normal = total - baixo - critico;

            document.getElementById('materiais-view-total').textContent = total;
            document.getElementById('materiais-normal').textContent = normal;
            document.getElementById('materiais-baixo').textContent = baixo;
            document.getElementById('materiais-critico').textContent = critico;
        }

        function renderizarMateriais() {
            const tbody = document.getElementById('materiais-table-body');
            const searchTerm = document.getElementById('search-materiais').value.toLowerCase();
            const tipo = document.getElementById('filter-tipo-material').value;

            let filtrados = materiaisData.filter(m => {
                const matchSearch = !searchTerm ||
                    (m.codigo && m.codigo.toLowerCase().includes(searchTerm)) ||
                    (m.descricao && m.descricao.toLowerCase().includes(searchTerm));
                const matchTipo = !tipo || m.tipo === tipo;
                return matchSearch && matchTipo;
            });

            document.getElementById('materiais-showing').textContent = filtrados.length;
            document.getElementById('materiais-total-count').textContent = materiaisData.length;

            if (filtrados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; padding: 60px;">
                    <i class="fas fa-cubes" style="font-size: 48px; color: var(--gray-300); margin-bottom: 16px;"></i>
                    <p style="color: var(--gray-500);">Nenhum material encontrado</p>
                </td></tr>`;
                return;
            }

            tbody.innerHTML = filtrados.map(m => `
                <tr>
                    <td><strong>${m.codigo || '-'}</strong></td>
                    <td>${m.descricao || '-'}</td>
                    <td><span class="badge badge-purple">${m.tipo || m.tipo_material || '-'}</span></td>
                    <td>${m.ncm || m.codigo_ncm || '-'}</td>
                    <td>${m.gtin || m.codigo_gtin || m.codigo_barras || '-'}</td>
                    <td>${m.unidade || '-'}</td>
                    <td>${m.estoque || 0}</td>
                    <td>${formatarMoeda(m.preco)}</td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="editarMaterial(${m.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-secondary" onclick="verMaterial(${m.id})"><i class="fas fa-eye"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function buscarMateriais() { renderizarMateriais(); }
        function exportarMateriais() { exportarParaExcel(materiaisData, 'materiais'); }
        function abrirEntradaRapidaMaterial() { abrirModalMovimentacaoMaterial('entrada'); }
        function abrirSaidaRapidaMaterial() { abrirModalMovimentacaoMaterial('saida'); }
        function abrirAjusteInventarioMaterial() { abrirModalMovimentacaoMaterial('ajuste'); }
        function verHistoricoMaterial() { showToast('Histórico em desenvolvimento', 'info'); }

        document.getElementById('search-materiais').addEventListener('keypress', e => { if (e.key === 'Enter') buscarMateriais(); });

        document.addEventListener('DOMContentLoaded', function() {
            atualizarSaudacao();
            carregarMateriais();

            // Carregar modais via fetch
            fetch('../templates/pcp-modals.html')
                .then(res => res.text())
                .then(html => {
                    const container = document.createElement('div');
                    container.innerHTML = html;
                    document.body.appendChild(container);
                })
                .catch(err => console.warn('Modais não carregados:', err));
        });
    </script>
