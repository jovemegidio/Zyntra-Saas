# =================================================================
# LABOR ELETRIC + LABOR ENERGY — Nginx (path-based em aluforce.api.br)
#
# Os blocos de location abaixo já estão integrados em deploy/nginx.conf.
# Este arquivo documenta a configuração caso precise ser aplicada
# manualmente em outro ambiente ou servidor separado.
#
# Como aplicar:
#   Copie os blocos location para dentro do server block HTTPS do
#   aluforce.api.br em /etc/nginx/sites-enabled/aluforce (ou equivalente),
#   antes da diretiva error_page.
#
#   Em seguida: nginx -t && systemctl reload nginx
# =================================================================

# ── Labor Eletric — /labor-eletric/ (porta 3001) ─────────────────

location = /labor-eletric {
    return 301 /labor-eletric/;
}

location ^~ /labor-eletric/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_max_body_size 25m;
}

# ── Labor Energy — /labor-energy/ (porta 3002) ────────────────────

location = /labor-energy {
    return 301 /labor-energy/;
}

location ^~ /labor-energy/ {
    proxy_pass http://127.0.0.1:3002/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    client_max_body_size 25m;
}

# =================================================================
# NOTAS:
# - proxy_pass com trailing slash (http://127.0.0.1:3001/) faz nginx
#   remover o prefixo /labor-eletric/ antes de enviar ao Node.js.
#   Exemplo: GET /labor-eletric/api/auth/login → Node recebe GET /api/auth/login
#
# - O MOUNT_PATH=/labor-eletric no PM2 faz o middleware zyntra-branding.js
#   injetar um script JS que redireciona fetch/XHR de volta para o prefixo,
#   garantindo que requests do browser cheguem à instância correta.
#
# - Socket.IO usa a conexão ws:// diretamente sem o prefixo.
#   Isso é tratado pelo servidor principal Aluforce (porta 3000) e é
#   aceitável pois eventos são filtrados por empresa_id no JWT.
# =================================================================
