<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório — Zyntra ERP</title>
  <style>
    :root {
      --ink:         #0c1726;
      --text:        #385062;
      --muted:       #6d8092;
      --line:        #d8e4ed;
      --line-soft:   #edf4f8;
      --surface:     #ffffff;
      --soft:        #f6fafc;
      --soft-2:      #f2f7fb;
      --brand:       #0b2842;
      --brand-2:     #103758;
      --accent:      #18b6c8;
      --accent-soft: #e7fbfd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: A4 landscape; margin: 0; }
    html, body {
      background: #eef4f8;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body { display: flex; justify-content: center; }

    .a4-stage  { width: 297mm; min-height: 210mm; background: #eef4f8; padding: 7mm 0; }
    .page-frame { width: 277mm; margin: 0 auto; }

    .top-rule {
      height: 5px;
      background: linear-gradient(90deg, var(--brand) 0%, var(--brand-2) 55%, var(--accent) 100%);
      border-radius: 999px;
      margin-bottom: 7px;
    }

    .page-shell {
      background: white;
      border: 1px solid #dbe8f1;
      border-radius: 16px;
      box-shadow: 0 14px 36px rgba(11,40,66,0.07);
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────── */
    .rpt-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 11px 9px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff 0%, #f8fcfe 100%);
    }
    .brand-wrap  { display: flex; align-items: center; gap: 9px; }
    .logo-img    { height: 38px; width: auto; flex-shrink: 0; }
    .brand-name  { font-size: 13px; font-weight: 900; color: var(--brand); text-transform: uppercase; letter-spacing: 0.08em; }
    .brand-sub   { font-size: 7px;  color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 2px; }
    .rpt-title-block { text-align: right; }
    .rpt-title   { font-size: 15px; font-weight: 900; color: var(--ink); line-height: 1.1; }
    .rpt-meta    { font-size: 7.5px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    /* ── FILTRO BAR ──────────────────────────────── */
    .filtro-bar {
      font-size: 8px;
      color: var(--muted);
      background: var(--soft);
      border-bottom: 1px solid var(--line-soft);
      padding: 5px 11px;
    }
    .filtro-bar span { color: var(--ink); font-weight: 700; }

    /* ── RESUMO CARDS ────────────────────────────── */
    .resumo-grid {
      display: grid;
      gap: 6px;
      padding: 8px 11px;
      border-bottom: 1px solid var(--line-soft);
    }
    .resumo-card {
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 7px 10px;
      background: var(--soft);
    }
    .resumo-card.accent-card {
      background: var(--accent-soft);
      border-color: rgba(24,182,200,0.3);
    }
    .resumo-label { font-size: 6.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.13em; font-weight: 700; }
    .resumo-valor { font-size: 13px; font-weight: 900; color: var(--brand); font-variant-numeric: tabular-nums; margin-top: 2px; line-height: 1; }
    .resumo-card.accent-card .resumo-valor { color: var(--accent); }

    /* ── TABLE ───────────────────────────────────── */
    .table-wrap {
      padding: 0 11px 10px;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      font-size: 8px;
    }
    thead th {
      background: linear-gradient(180deg, var(--brand) 0%, var(--brand-2) 100%);
      color: white;
      font-size: 6.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      padding: 7px 8px;
      text-align: left;
      white-space: nowrap;
    }
    tbody td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--line-soft);
      color: var(--text);
      vertical-align: middle;
      line-height: 1.3;
    }
    tbody tr:nth-child(even) td { background: var(--soft); }
    tbody tr:last-child td { border-bottom: none; }
    .td-money  { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--ink); }
    .td-center { text-align: center; }
    .td-right  { text-align: right; }
    .td-strong { font-weight: 700; color: var(--ink); }
    .td-muted  { color: var(--muted); font-size: 7.5px; }

    /* section header row */
    .tr-section td {
      background: var(--accent-soft) !important;
      color: var(--brand) !important;
      font-weight: 800 !important;
      font-size: 8px !important;
      border-top: 1px solid rgba(24,182,200,0.25);
      border-bottom: 1px solid rgba(24,182,200,0.25);
    }
    /* subtotal row */
    .tr-subtotal td {
      background: #eff6ff !important;
      color: #1e3a8a !important;
      font-weight: 700 !important;
      font-size: 7.8px !important;
      font-variant-numeric: tabular-nums;
      text-align: right;
      border-top: 1px solid #bfdbfe;
    }

    /* ── FOOTER ──────────────────────────────────── */
    .rpt-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 11px;
      border-top: 1px solid var(--line-soft);
      background: var(--soft);
      font-size: 7px;
      color: var(--muted);
    }
    .rpt-footer .total-info { font-size: 8px; font-weight: 700; color: var(--ink); }
    .rpt-footer .brand-footer { font-weight: 700; color: var(--brand); }
  </style>
</head>
<body>
  <div class="a4-stage">
    <div class="page-frame">
      <div class="top-rule"></div>
      <div class="page-shell">

        <div class="rpt-head">
          <div class="brand-wrap">
            <img class="logo-img" id="tpl-logo"
              src="/images/Logo Monocromatico - Azul - Aluforce.png" alt="Logo"
              onerror="this.style.display='none'">
            <div>
              <div class="brand-name" id="tpl-empresa-nome">ZYNTRA ERP</div>
              <div class="brand-sub">Sistema de Gestão Empresarial</div>
            </div>
          </div>
          <div class="rpt-title-block">
            <h1 class="rpt-title" id="tpl-titulo">Relatório</h1>
            <div class="rpt-meta" id="tpl-meta"></div>
          </div>
        </div>

        <div class="filtro-bar" id="tpl-filtro" style="display:none;"></div>

        <div class="resumo-grid" id="tpl-resumo" style="display:none;"></div>

        <div class="table-wrap" style="padding-top:8px;">
          <table>
            <thead id="tpl-thead"></thead>
            <tbody id="tpl-tbody"></tbody>
          </table>
        </div>

        <div class="rpt-footer">
          <span class="total-info" id="tpl-total-info"></span>
          <span><span class="brand-footer" id="tpl-empresa-footer">Zyntra ERP</span> &mdash; Documento Confidencial</span>
          <span id="tpl-gerado"></span>
        </div>

      </div>
    </div>
  </div>

<script>
(function () {
  var D = window.relatorioData || {};
  var rel    = D.relatorio  || {};
  var emp    = D.empresa    || {};
  var cols   = D.colunas    || [];
  var rows   = D.linhas     || [];
  var secs   = D.secoes     || null;
  var resumo = D.resumo     || [];

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function el(id) { return document.getElementById(id); }

  /* ── empresa & header ───────────────────────── */
  if (emp.nome) { el('tpl-empresa-nome').textContent = emp.nome; el('tpl-empresa-footer').textContent = emp.nome; }

  var agora = new Date().toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' });
  el('tpl-titulo').textContent = rel.titulo || 'Relatório';
  el('tpl-meta').innerHTML =
    (rel.filtros ? '<span style="color:var(--ink);font-weight:700;">' + esc(rel.filtros) + '</span><br>' : '') +
    'Gerado em ' + esc(rel.data_geracao || agora) +
    (rel.usuario ? ' &bull; ' + esc(rel.usuario) : '');

  /* ── filtro bar ─────────────────────────────── */
  if (rel.filtros) {
    var fb = el('tpl-filtro');
    fb.style.display = '';
    fb.innerHTML = 'Filtro aplicado: <span>' + esc(rel.filtros) + '</span>';
  }

  /* ── resumo cards ───────────────────────────── */
  if (resumo.length > 0) {
    var rg = el('tpl-resumo');
    rg.style.display = '';
    rg.style.gridTemplateColumns = 'repeat(' + resumo.length + ', 1fr)';
    rg.innerHTML = resumo.map(function(c, i) {
      return '<div class="resumo-card' + (i === 0 ? ' accent-card' : '') + '">' +
        '<div class="resumo-label">' + esc(c.label) + '</div>' +
        '<div class="resumo-valor">' + esc(c.valor) + '</div>' +
        '</div>';
    }).join('');
  }

  /* ── thead ──────────────────────────────────── */
  var thead = el('tpl-thead');
  if (cols.length > 0) {
    thead.innerHTML = '<tr>' + cols.map(function(c) {
      var style = '';
      if (c.width) style += 'width:' + c.width + ';';
      if (c.align) style += 'text-align:' + c.align + ';';
      return '<th style="' + style + '">' + esc(c.label || c) + '</th>';
    }).join('') + '</tr>';
  }

  /* ── tbody ──────────────────────────────────── */
  var tbody = el('tpl-tbody');
  var totalRows = 0;

  function renderRow(cells, idx) {
    var even = idx % 2 === 0;
    return '<tr' + (even ? '' : ' class="odd"') + '>' +
      cells.map(function(v, ci) {
        var col   = cols[ci] || {};
        var align = col.align || '';
        var cls   = '';
        if (align === 'right')  cls = 'td-right';
        if (align === 'center') cls = 'td-center';
        var sv = String(v == null ? '' : v);
        if (sv.startsWith('R$')) cls = 'td-money';
        if (sv.startsWith('**')) { sv = sv.slice(2); cls += ' td-strong'; }
        return '<td class="' + cls + '">' + esc(sv) + '</td>';
      }).join('') + '</tr>';
  }

  if (secs) {
    /* sectioned layout (comissoes) */
    var html = '';
    secs.forEach(function(sec) {
      /* section header row spanning all cols */
      html += '<tr class="tr-section"><td colspan="' + cols.length + '">' + esc(sec.titulo) + (sec.info ? ' &mdash; ' + esc(sec.info) : '') + '</td></tr>';
      (sec.linhas || []).forEach(function(row, idx) { html += renderRow(row, idx); totalRows++; });
      if (sec.subtotal) {
        html += '<tr class="tr-subtotal"><td colspan="' + cols.length + '">' + esc(sec.subtotal) + '</td></tr>';
      }
    });
    tbody.innerHTML = html;
  } else {
    /* flat layout */
    tbody.innerHTML = rows.map(function(row, idx) { totalRows++; return renderRow(row, idx); }).join('');
  }

  /* empty state */
  if (totalRows === 0) {
    tbody.innerHTML = '<tr><td colspan="' + cols.length + '" style="text-align:center;color:#94a3b8;padding:20px;font-size:9px;">Nenhum registro encontrado para os filtros selecionados.</td></tr>';
  }

  /* ── footer ─────────────────────────────────── */
  el('tpl-total-info').textContent =
    (D.totais ? D.totais + '  •  ' : '') +
    (D.total_registros != null ? D.total_registros + ' registro(s)' : totalRows + ' registro(s)');
  el('tpl-gerado').textContent = rel.data_geracao || agora;
})();
</script>
</body>
</html>
