<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <base href="/lp/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zyntra">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Zyntra">
    <meta name="msapplication-TileColor" content="#0d1117">
    <meta name="format-detection" content="telephone=no">
    
    <title>Zyntra: Login</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="icon" type="image/png" href="Favicon%20-%20Zyntra.png">
    
    <!-- CSS Principal do Login v2 -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-page">
        <!-- ===== BACKGROUND LAYERS ===== -->
        <div class="bg-layer">
            <!-- Background Image -->
            <div class="bg-image"></div>
            
            <!-- Dark overlay for contrast -->
            <div class="bg-dark-overlay"></div>
            
            <!-- Animated gradient overlay -->
            <div class="bg-gradient-overlay theme-0" id="bg-gradient"></div>
            
            <!-- Animated Gradient Orbs -->
            <div class="bg-orb bg-orb-1" id="bg-orb-1"></div>
            <div class="bg-orb bg-orb-2" id="bg-orb-2"></div>
            
            <!-- Floating particles -->
            <div class="particles-container" id="particles"></div>

            <!-- Theme indicator dots -->
            <div class="theme-dots" id="theme-dots">
                <button class="theme-dot active" data-theme="0" aria-label="Tema 1"></button>
                <button class="theme-dot" data-theme="1" aria-label="Tema 2"></button>
                <button class="theme-dot" data-theme="2" aria-label="Tema 3"></button>
                <button class="theme-dot" data-theme="3" aria-label="Tema 4"></button>
            </div>
        </div>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="login-content" id="login-content">
            <!-- Login Card -->
            <div class="glass-card">
                <!-- Header with Avatar -->
                <div class="login-header">
                    <!-- Logo -->
                    <img src="Zyntra%20-%20Branco.png" alt="Logo Zyntra" class="login-logo" onerror="this.style.display='none'">
                    
                    <!-- Dynamic Avatar -->
                    <div class="avatar-container" id="avatar-container">
                        <div class="avatar-box" id="avatar-box">
                            <!-- Default icon (lightning bolt) -->
                            <div class="avatar-icon" id="avatar-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                </svg>
                            </div>
                        </div>
                        <!-- Typing indicator ring -->
                        <div class="avatar-ring"></div>
                    </div>

                    <!-- Dynamic Greeting -->
                    <h1 class="login-greeting" id="login-greeting">Bem-vindo de volta</h1>
                    <p class="login-subtitle" id="login-subtitle">Entre na sua conta para continuar</p>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="login-form-content" autocomplete="on">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <!-- Mail icon (SVG) -->
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                                <path d="M22 7l-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                            </svg>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                class="form-input" 
                                placeholder="seu@email.com" 
                                autocomplete="email" 
                                required
                            >
                        </div>
                        <div class="field-error" id="email-error" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <span></span>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <div class="label-row">
                            <label for="password">Senha</label>
                            <button type="button" class="forgot-link" id="forgot-password">Esqueceu a senha?</button>
                        </div>
                        <div class="input-wrapper">
                            <!-- Lock icon (SVG) -->
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input password-input" 
                                placeholder="••••••••" 
                                autocomplete="current-password" 
                                required
                            >
                            <!-- Eye toggle -->
                            <button type="button" class="password-toggle-btn" id="password-toggle" tabindex="-1" title="Mostrar/Ocultar senha">
                                <!-- Eye open (default) -->
                                <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                                <!-- Eye off (hidden by default) -->
                                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                        <div class="field-error" id="password-error" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <span></span>
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="remember-row">
                        <div class="custom-checkbox">
                            <input type="checkbox" id="remember-me" name="remember">
                            <div class="checkbox-visual">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                        </div>
                        <label for="remember-me" class="remember-label">Lembrar de mim por 30 dias</label>
                    </div>

                    <!-- Error/Success Message -->
                    <div id="error-message" class="login-message" role="alert"></div>

                    <!-- Submit Button -->
                    <button type="submit" id="login-submit-btn" class="login-submit-btn">
                        <span class="btn-content">
                            <!-- Default state -->
                            <span class="btn-text-default">
                                Entrar
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                                </svg>
                            </span>
                            <!-- Loading state -->
                            <span class="btn-text-loading">
                                <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                                </svg>
                                Entrando...
                            </span>
                            <!-- Success state -->
                            <span class="btn-text-success">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                                Login realizado!
                            </span>
                        </span>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <p class="login-footer">
                © 2026 Zyntra. Sistema de Gestão Empresarial.
            </p>
        </div>
    </div>

    <!-- ===== MODAL DE RECUPERAÇÃO DE SENHA ===== -->
    <div id="forgot-password-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            
            <div class="modal-header">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                    </svg>
                    Recuperar Senha
                </h3>
                <p>Siga os passos para redefinir sua senha</p>
            </div>

            <div class="step-indicator">
                <div class="step-dot active" id="step-dot-1"></div>
                <div class="step-dot" id="step-dot-2"></div>
                <div class="step-dot" id="step-dot-3"></div>
            </div>

            <!-- Passo 1: Verificar Email -->
            <div class="modal-step active" id="step-1">
                <div class="modal-form-group">
                    <label for="verify-email">Email</label>
                    <input type="email" id="verify-email" class="modal-input" placeholder="seuemail@aluforce.ind.br" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn modal-btn-secondary" id="cancel-step-1">Cancelar</button>
                    <button type="button" class="modal-btn modal-btn-primary" id="next-step-1">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        Enviar Link
                    </button>
                </div>
            </div>

            <!-- Passo 2: Verificar Dados -->
            <div class="modal-step" id="step-2">
                <div class="modal-form-group">
                    <label for="verify-name">Nome Completo</label>
                    <input type="text" id="verify-name" class="modal-input" placeholder="Seu nome completo" required>
                </div>
                <div class="modal-form-group">
                    <label for="verify-department">Departamento</label>
                    <select id="verify-department" class="modal-input" required>
                        <option value="">Selecione seu departamento</option>
                        <option value="PCP">PCP - Planejamento e Controle</option>
                        <option value="Produção">Produção</option>
                        <option value="Vendas">Vendas</option>
                        <option value="Administrativo">Administrativo</option>
                        <option value="TI">Tecnologia da Informação</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn modal-btn-secondary" id="back-step-2">← Voltar</button>
                    <button type="button" class="modal-btn modal-btn-primary" id="next-step-2">Verificar →</button>
                </div>
            </div>

            <!-- Passo 3: Nova Senha -->
            <div class="modal-step" id="step-3">
                <div class="modal-form-group">
                    <label for="new-password">Nova Senha</label>
                    <input type="password" id="new-password" class="modal-input" placeholder="Digite sua nova senha" required>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill"></div>
                        </div>
                        <span class="strength-text">Digite uma senha forte</span>
                    </div>
                </div>
                <div class="modal-form-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <input type="password" id="confirm-password" class="modal-input" placeholder="Digite novamente sua nova senha" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn modal-btn-secondary" id="back-step-3">← Voltar</button>
                    <button type="button" class="modal-btn modal-btn-primary" id="change-password">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Alterar Senha
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth-unified.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
