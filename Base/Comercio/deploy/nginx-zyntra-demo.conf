# ============================================================
# NGINX – zyntra-demo domain block
# Porta: 3003 (PM2: zyntra-demo)
#
# Como usar:
#   1. Copie este arquivo para /etc/nginx/sites-available/zyntra-demo
#   2. Crie o symlink:  ln -s /etc/nginx/sites-available/zyntra-demo /etc/nginx/sites-enabled/zyntra-demo
#   3. Ajuste "server_name" para o domínio real escolhido
#   4. Emita certificado SSL:  certbot --nginx -d demo.seudominio.com.br
#   5. Teste: nginx -t && systemctl reload nginx
#
# Opções de domínio sugeridas (escolha um):
#   demo.zyntra.com.br   → para apresentação da plataforma Zyntra
#   zyntra.aluforce.api.br → subdomínio já no mesmo certificado wildcard (se houver)
#   demo.aluforce.api.br → mais simples, sem novo registro DNS
# ============================================================

upstream zyntra_demo_backend {
    server 127.0.0.1:3003;
}

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    server_name demo.zyntra.com.br;    # ← ALTERE AQUI para seu domínio

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name demo.zyntra.com.br;    # ← ALTERE AQUI para seu domínio

    charset utf-8;
    charset_types text/css application/javascript application/json text/xml text/plain;

    # Certificado SSL (gerado pelo Certbot)
    # ssl_certificate     /etc/letsencrypt/live/demo.zyntra.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/demo.zyntra.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;

    # WebSocket
    location /socket.io/ {
        proxy_pass http://zyntra_demo_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
        proxy_buffering off;
        proxy_cache off;
    }

    # API
    location /api/ {
        proxy_pass http://zyntra_demo_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTML – sem cache
    location ~* \.html$ {
        proxy_pass http://zyntra_demo_backend;
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
        add_header Pragma 'no-cache' always;
        add_header Expires '0' always;
    }

    # JS / CSS – sem cache (ambiente demo)
    location ~* \.(js|css)$ {
        proxy_pass http://zyntra_demo_backend;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Imagens / fontes – pode cachear
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://zyntra_demo_backend;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Tudo mais
    location / {
        proxy_pass http://zyntra_demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
