<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <base href="/lp/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyntra: Grupos de Acesso</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/pages-app.css">
    <link rel="stylesheet" href="css/app-settings.css">
    <link rel="icon" type="image/png" href="Favicon - Zyntra.png">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="dash-nav">
        <div class="dash-nav__inner">
            <div class="dash-nav__left">
                <a href="Empresas/dashboard.html" class="dash-nav__logo"><img src="Zyntra - Branco.png" alt="Zyntra"></a>
                <div class="dash-nav__links">
                    <a href="Empresas/dashboard.html" class="dash-nav__link">Meus Aplicativos</a>
                    <a href="Empresas/extrato-financeiro.html" class="dash-nav__link">Extrato Financeiro</a>
                </div>
            </div>
            <div class="dash-nav__right">
                <div style="position:relative;">
                    <button class="dash-nav__user" id="userBtn"><div class="dash-nav__avatar" id="userAvatar">U</div><span class="dash-nav__user-name" id="userName">Usuário</span></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <div class="app-header">
        <div class="app-header__inner">
            <button class="app-back-btn" onclick="history.back()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                voltar
            </button>
            <div class="app-page-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Grupos de Acesso
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="app-main">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
            <h1 style="font-size:18px;font-weight:800;color:var(--dark);" id="companyName">Grupo de Acesso</h1>
            <button class="btn-dash btn-dash--primary" id="btnNewGroup">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Criar novo grupo
            </button>
        </div>

        <div id="groupsContainer">
            <!-- Filled by JS -->
        </div>

    </main>

    <div class="toast" id="toast"></div>
    <script src="js/app-settings.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('groupsContainer');
        const groups = [
            { name: 'Administraçăo', permissions: ['Configuraçőes','Exportaçăo de Dados','Acessar o Cadastro de Produtos','Acessar o Estoque','Acessar Todos os Vendedores','Acessar os Relatórios de Vendas','Alterar e Excluir Pedidos de Vendas','Alterar e Excluir Contas a Pagar','Alterar e Excluir Contas a Receber','Gerenciar Notas Fiscais','Incluir Produtos e Serviços','Excluir Produtos e Serviços','Acessar o Módulo Financeiro','Acessar Relatórios Financeiros','Emitir Boletos','Emitir Notas Fiscais','Acessar DRE','Conciliaçăo Bancária','Dashboard Completo','Acessar Configuraçőes de Impostos'] },
            { name: 'Vendas', permissions: ['Exportaçăo de Dados','Acessar o Cadastro de Produtos','Acessar Todos os Vendedores','Acessar os Relatórios de Vendas','Incluir Pedidos de Vendas','Alterar Pedidos de Vendas'] },
            { name: 'Financeiro', permissions: ['Exportaçăo de Dados','Acessar o Módulo Financeiro','Acessar Relatórios Financeiros','Acessar Contas a Pagar','Acessar Contas a Receber','Conciliaçăo Bancária','Emitir Boletos','Acessar DRE'] },
            { name: 'Estoque e Produçăo', permissions: ['Exportaçăo de Dados','Acessar o Cadastro de Produtos','Acessar o Estoque','Incluir Produtos e Serviços','Movimentaçăo de Estoque','Inventário'] },
            { name: 'Fiscal', permissions: ['Exportaçăo de Dados','Emitir Notas Fiscais','Gerenciar Notas Fiscais','Acessar Configuraçőes de Impostos','Relatórios Fiscais'] },
            { name: 'Portal do Contador', permissions: ['Exportaçăo de Dados','Acessar Relatórios Financeiros','Relatórios Fiscais','Acessar DRE'] },
            { name: 'Compras e Faturamento', permissions: ['Exportaçăo de Dados','Acessar o Cadastro de Produtos','Acessar Contas a Pagar','Incluir Pedidos de Compra','Gerenciar Notas Fiscais de Entrada'] },
            { name: 'Consultoria', permissions: ['Configuraçőes','Exportaçăo de Dados','Dashboard Completo','Acessar Relatórios Financeiros','Acessar os Relatórios de Vendas','Acessar DRE','Conciliaçăo Bancária'] },
            { name: 'Treinamento', permissions: ['Exportaçăo de Dados','Acessar o Cadastro de Produtos','Acessar o Estoque','Incluir Pedidos de Vendas','Acessar o Módulo Financeiro'] }
        ];

        groups.forEach((g, i) => {
            const card = document.createElement('div');
            card.className = 'grupo-card';
            card.innerHTML = `
                <div class="grupo-card__header" onclick="this.parentElement.classList.toggle('open')">
                    <span class="grupo-card__name">${g.name}</span>
                    <div class="grupo-card__actions">
                        <button class="grupo-card__btn">Editar</button>
                        <button class="grupo-card__btn primary">Gerenciar membros</button>
                        <svg class="grupo-card__toggle" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>
                <div class="grupo-card__body">
                    <div class="grupo-perm-grid">
                        ${g.permissions.map(p => `
                            <label class="grupo-perm-item">
                                <input type="checkbox" checked disabled>
                                ${p}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        // Open first group by default
        container.querySelector('.grupo-card')?.classList.add('open');

        document.getElementById('btnNewGroup')?.addEventListener('click', () => {
            window.showToast && window.showToast('?? Funcionalidade de criar grupo em breve');
        });
    });
    </script>
</body>
</html>
