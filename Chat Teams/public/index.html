<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Corporativo</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══ TELA DE LOGIN ═══ -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-icon">💬</div>
        <h1>Chat Corporativo</h1>
        <p>Comunicação interna segura</p>
      </div>

      <div id="login-form" class="auth-form">
        <h2>Entrar</h2>
        <input type="text" id="login-username" placeholder="Usuário" autocomplete="username" />
        <input type="password" id="login-password" placeholder="Senha" autocomplete="current-password" />
        <button id="btn-login" class="btn-primary">Entrar</button>
        <p class="auth-switch">Não tem conta? <a href="#" id="show-register">Cadastre-se</a></p>
        <div id="login-error" class="error-msg"></div>
      </div>

      <div id="register-form" class="auth-form hidden">
        <h2>Cadastro</h2>
        <input type="text" id="reg-display" placeholder="Nome completo" />
        <input type="text" id="reg-username" placeholder="Usuário (login)" autocomplete="username" />
        <input type="password" id="reg-password" placeholder="Senha" autocomplete="new-password" />
        <select id="reg-department">
          <option value="Geral">Departamento</option>
          <option value="TI">TI</option>
          <option value="RH">Recursos Humanos</option>
          <option value="Financeiro">Financeiro</option>
          <option value="Comercial">Comercial</option>
          <option value="Marketing">Marketing</option>
          <option value="Operações">Operações</option>
          <option value="Diretoria">Diretoria</option>
        </select>
        <button id="btn-register" class="btn-primary">Cadastrar</button>
        <p class="auth-switch">Já tem conta? <a href="#" id="show-login">Faça login</a></p>
        <div id="register-error" class="error-msg"></div>
      </div>
    </div>
  </div>

  <!-- ═══ TELA DO CHAT ═══ -->
  <div id="chat-screen" class="screen">
    <div class="chat-layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo-small">💬</div>
          <span class="logo-text">Chat Corporativo</span>
        </div>

        <!-- Suporte I.A. -->
        <div class="sidebar-section" style="padding-bottom:4px;flex:0">
          <div class="section-header">
            <span>Suporte</span>
          </div>
          <ul id="bot-list" class="nav-list"></ul>
        </div>

        <!-- Canais -->
        <div class="sidebar-section">
          <div class="section-header">
            <span>Canais</span>
            <button id="btn-new-channel" class="btn-icon" title="Novo canal">+</button>
          </div>
          <ul id="channel-list" class="nav-list"></ul>
        </div>

        <!-- Mensagens Diretas -->
        <div class="sidebar-section">
          <div class="section-header">
            <span>Mensagens Diretas</span>
          </div>
          <ul id="dm-list" class="nav-list"></ul>
        </div>

        <!-- Usuário logado -->
        <div class="sidebar-footer">
          <div id="current-user-info" class="user-badge"></div>
          <button id="btn-logout" class="btn-icon" title="Sair">⏻</button>
        </div>
      </aside>

      <!-- ÁREA PRINCIPAL -->
      <main class="chat-main">
        <div class="chat-header">
          <div class="chat-header-info">
            <h2 id="chat-title">#geral</h2>
            <span id="chat-description" class="chat-desc">Canal geral da empresa</span>
          </div>
          <div class="chat-header-actions">
            <span id="online-count" class="online-badge">0 online</span>
          </div>
        </div>

        <div id="messages-container" class="messages-area">
          <div id="messages" class="messages-list"></div>
        </div>

        <div id="typing-indicator" class="typing-indicator hidden"></div>

        <div class="message-input-area">
          <div class="input-wrapper">
            <textarea id="message-input" placeholder="Escreva uma mensagem..." rows="1"></textarea>
            <button id="btn-send" class="btn-send" title="Enviar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal Novo Canal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Novo Canal</h3>
      <input type="text" id="new-channel-name" placeholder="Nome do canal" />
      <input type="text" id="new-channel-desc" placeholder="Descrição (opcional)" />
      <div class="modal-actions">
        <button id="btn-cancel-channel" class="btn-secondary">Cancelar</button>
        <button id="btn-create-channel" class="btn-primary">Criar</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
